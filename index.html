        body {

            background-color: #07080b;
            margin: 0;
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-size: 24px;
            display: inline-block;
            line-height: 1;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .card-transition {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* Slow zero-gravity upward drift animations for immersive particles */
        @keyframes floatSpheres {
            0% { transform: translateY(110vh) translateX(0) scale(1); opacity: 0; }
            30% { opacity: var(--max-opacity, 0.25); }
            70% { opacity: var(--max-opacity, 0.25); }
            100% { transform: translateY(-15vh) translateX(40px) scale(0.7); opacity: 0; }
        }
        .gravity-sphere {
            position: absolute;
            bottom: -50px;
            background: radial-gradient(circle, var(--sphere-color) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatSpheres var(--duration) ease-in-out infinite;
            pointer-events: none;
        }

        function App() {
            const [garage, setGarage] = useState(() => {
                const cleared = localStorage.getItem('gv_cleared');
                if (cleared === 'true') {
                    return [];
                }
                const saved = localStorage.getItem('gv_pro_garage_deck_v13');
                if (saved) {
                    try { return JSON.parse(saved); } catch (e) { console.error(e); }
                }
                return [];
            });

            useEffect(() => {
                try {
                    localStorage.setItem('gv_pro_garage_deck_v13', JSON.stringify(garage));
                    if (garage.length > 0) {
                        localStorage.removeItem('gv_cleared');
                    }
                } catch (error) {
                    if (error.name === 'QuotaExceededError' || error.name === 'NS_ERROR_DOM_QUOTA_REACHED') {
                        console.error("Storage full.");
                        showNotification("Quota Full! Download JSON file and Clear Garage.");
                    }
                }
            }, [garage]);

            // High-Performance Image Compression Helper to solve "Storage Full" errors
            const compressImage = (base64Str, maxWidth = 1000, maxHeight = 1000, quality = 0.75) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width *= maxHeight / height;
                                height = maxHeight;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                });
            };

            const [isDragging, setIsDragging] = useState(false);

            const floatingSpheres = useMemo(() => {
                return Array.from({ length: 18 }).map((_, idx) => ({
                    id: idx,
                    size: Math.random() * 45 + 15,
                    left: Math.random() * 92 + 3,
                    duration: `${Math.random() * 14 + 10}s`,
                    delay: `${Math.random() * -12}s`,
                    maxOpacity: Math.random() * 0.18 + 0.08
                }));
            }, [selectedGalleryCar]);

            const showNotification = (msg) => {
                setToast({ visible: true, message: msg });
                setTimeout(() => {
                    setToast(prev => ({ ...prev, visible: false }));
                }, 2500);
            };

            const handleMouseDown = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            useEffect(() => {
                const handleGlobalClickAway = () => {
                    setContextMenu(prev => ({ ...prev, visible: false }));
                };
                window.addEventListener('click', handleGlobalClickAway);
                return () => {
                    window.removeEventListener('click', handleGlobalClickAway);
                };
            }, []);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (!isDragging) return;
                    const rect = document.body.getBoundingClientRect();
                    let pct = (e.clientX / rect.width) * 100;
                    
                    if (pct < 5) pct = 0; 
                    if (pct > 95) pct = 100; 
                    
                    setSplitOffset(pct);
                };

                const handleMouseUp = () => {
                    setIsDragging(false);
                };

                if (isDragging) {
                    window.addEventListener('mousemove', handleMouseMove);
                    window.addEventListener('mouseup', handleMouseUp);
                }

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseup', handleMouseUp);
                };
            }, [isDragging]);

            const getCarLevel = (car) => {
                const brandStr = car.brand || "";
                const modelStr = car.modelName || "";
                const fullName = `${car.year || ''} ${brandStr} ${modelStr}`.toLowerCase().trim();

                const match = BANNED_DATABASE.find(b => {
                    const bName = b.name.toLowerCase().trim();
                    return fullName.includes(bName) || bName.includes(fullName);
                });

                if (match) {
                    return match.level;
                }
                
                if (car.level && car.level !== '0' && car.level !== 'Level 0' && car.level !== 'Standard') {
                    return car.level;
                }
                return 'Level 0';
            };

            const getLevelBadgeStyles = (levelValue) => {
                const lvl = (levelValue || '').toUpperCase().trim();
                if (lvl === 'L1' || lvl === 'LEVEL 1') return { bg: 'rgba(16, 185, 129, 0.15)', text: '#10b981', border: 'rgba(16, 185, 129, 0.3)' };
                if (lvl === 'L2' || lvl === 'LEVEL 2') return { bg: 'rgba(245, 158, 11, 0.15)', text: '#f59e0b', border: 'rgba(245, 158, 11, 0.3)' };
                if (lvl === 'L3' || lvl === 'LEVEL 3') return { bg: 'rgba(249, 115, 22, 0.15)', text: '#f97316', border: 'rgba(249, 115, 22, 0.3)' };
                if (lvl === 'L4' || lvl === 'LEVEL 4') return { bg: 'rgba(239, 68, 68, 0.15)', text: '#ef4444', border: 'rgba(239, 68, 68, 0.3)' };
                if (lvl === 'BANNED' || lvl === 'PERMBANNED' || lvl === 'PERM BANNED') {
                    return { bg: 'rgba(127, 29, 29, 0.6)', text: '#ff2222', border: '#ef4444', glow: '0 0 10px rgba(239, 68, 68, 0.8)' };
                }
                return { bg: 'rgba(148, 163, 184, 0.15)', text: '#94a3b8', border: 'rgba(148, 163, 184, 0.3)' };
            };

            const getDynamicGradient = (colorInput) => {
                const input = (colorInput || "").toLowerCase().trim();
                let r = 30, g = 35, b = 45; 

                if (input === 'ruby' || input === 'red' || input === '#c81e32') {
                    r = 230; g = 12; b = 32;
                } else if (input === 'sapphire' || input === 'blue' || input === '#1e50d2') {
                    r = 15; g = 90; b = 240;
                } else if (input === 'green' || input === 'emerald' || input === '#1ea046') {
                    r = 10; g = 180; b = 55;
                } else if (input === 'yellow' || input === 'gold' || input === '#e6c411') {
                    r = 220; g = 170; b = 12;
                } else if (input === 'purple' || input === '#9b59b6') {
                    r = 150; g = 35; b = 220;
                } else if (input === 'orange' || input === '#e67e22') {
                    r = 220; g = 85; b = 12;
                } else if (input.startsWith('#')) {
                    try {
                        const hex = input.replace('#', '');
                        if (hex.length === 6) {
                            r = parseInt(hex.slice(0, 2), 16) || 30;
                            g = parseInt(hex.slice(2, 4), 16) || 35;
                            b = parseInt(hex.slice(4, 6), 16) || 45;
                        }
                    } catch (e) {}
                }

                return {
                    gradient: `radial-gradient(circle at 50% 50%, rgba(${r}, ${g}, ${b}, 0.58) 0%, rgba(${r}, ${g}, ${b}, 0.30) 22%, rgba(${r}, ${g}, ${b}, 0.08) 55%, rgba(7, 8, 11, 1) 85%)`,
                    border: `rgba(${r}, ${g}, ${b}, 0.25)`,
                    rawRGB: `${r}, ${g}, ${b}`
                };
            };

            const getHexForColorName = (name) => {
                const map = {
                    "All Colors": "transparent",
                    "Red": "#ff2a3b",
                    "Blue": "#0a84ff",
                    "Green": "#30d158",
                    "Yellow": "#ffd60a",
                    "Purple": "#bf5af2",
                    "Gray": "#8e8e93",
                    "Orange": "#ff9f0a"
                };
                return map[name] || "transparent";
            };

            const getGreenvilleTagStyles = (tag) => {
                const cleanTag = (tag || "").toLowerCase().trim();
                if (cleanTag === 'limited') {
                    return { bg: 'rgba(255, 214, 10, 0.12)', text: '#ffd60a', border: 'rgba(255, 214, 10, 0.35)' };
                }
                if (cleanTag === 'off-sale') {
                    return { bg: 'rgba(255, 69, 58, 0.12)', text: '#ff453a', border: 'rgba(255, 69, 58, 0.35)' };
                }
                if (cleanTag === 'collectible') {
                    return { bg: 'rgba(10, 132, 255, 0.12)', text: '#0a84ff', border: 'rgba(10, 132, 255, 0.35)' };
                }
                if (cleanTag === 'event') {
                    return { bg: 'rgba(255, 159, 10, 0.12)', text: '#ff9f0a', border: 'rgba(255, 159, 10, 0.35)' };
                }
                return { bg: 'rgba(255, 255, 255, 0.08)', text: '#ffffff', border: 'rgba(255, 255, 255, 0.15)' };
            };

            const calculateEstimatedSellPrice = (cost, miles) => {
                const rawCost = Number(cost) || 0;
                const rawMiles = Number(miles) || 0;
                if (rawCost <= 0) return 0;
                const mileageFactor = Math.max(0.55, 0.85 - (rawMiles * 0.000015));
                return Math.round(rawCost * mileageFactor);
            };

            const handleOpenAdd = () => {
                setCurrentCar({
                    year: new Date().getFullYear().toString(),
                    brand: '',
                    modelName: '',
                    trim: '',
                    color: 'Gray',
                    type: 'Sport',
                    cost: '',
                    miles: '',
                    horsepower: '450',
                    favorite: false,
                    topSpeed: '',
                    engineType: 'Internal Combustion',
                    level: 'Level 0',
                    tags: [],
                    images: []
                });
                setSampledPicData(null);
                setShowAddEditModal(true);
            };

            const handleOpenEdit = (car) => {
                const resolvedLevel = getCarLevel(car);
                setCurrentCar({ 
                    ...car, 
                    level: resolvedLevel,
                    tags: car.tags || [], 
                    images: car.images || [] 
                });
                setSampledPicData(car.image || null);
                setShowAddEditModal(true);
            };

            const handleSaveCar = (e) => {
                e.preventDefault();
                const finalCar = {
                    ...currentCar,
                    id: currentCar.id || Date.now(),
                    cost: Number(currentCar.cost) || 0,
                    miles: Number(currentCar.miles) || 0,
                    horsepower: Number(currentCar.horsepower) || 300,
                    topSpeed: Number(currentCar.topSpeed) || 0,
                    level: currentCar.level || 'Level 0',
                    tags: currentCar.tags || [],
                    images: currentCar.images || []
                };

                if (currentCar.id && garage.some(c => c.id === currentCar.id)) {
                    setGarage(prev => prev.map(c => c.id === currentCar.id ? finalCar : c));
                    showNotification(`Saved changes: ${finalCar.brand} ${finalCar.modelName}`);
                } else {
                    setGarage(prev => [finalCar, ...prev]);
                    showNotification(`Added brand new fleet vehicle: ${finalCar.brand} ${finalCar.modelName}`);
                }
                setShowAddEditModal(false);
                setCurrentCar(null);
                setSampledPicData(null);
            };

            const handleDeleteCar = (id) => {
                setGarage(garage.filter(c => c.id !== id));
                showNotification("Fleet vehicle permanently deleted.");
            };

            const handleToggleFavorite = (id) => {
                setGarage(garage.map(c => c.id === id ? { ...c, favorite: !c.favorite } : c));
            };

            const handleContextMenu = (e, carId) => {
                e.preventDefault();
                e.stopPropagation();
                setContextMenu({ visible: true, x: e.clientX, y: e.clientY, carId });
            };

            const checkBveOwned = (bveCarName) => {
                const bveWords = bveCarName.toLowerCase();
                return garage.find(g => {
                    const gName = `${g.year || ''} ${g.brand || ''} ${g.modelName || ''}`.toLowerCase().trim();
                    return bveWords.includes(gName) || gName.includes(bveWords);
                });
            };

            const filteredBve = useMemo(() => {
                return BANNED_DATABASE.filter(car => {
                    const matchesSearch = car.name.toLowerCase().includes(bveSearch.toLowerCase());
                    const matchesLevel = bveLevelFilter === 'All' || car.level.toLowerCase() === bveLevelFilter.toLowerCase();
                    return matchesSearch && matchesLevel;
                });
            }, [bveSearch, bveLevelFilter]);

            const sortedGarage = useMemo(() => {
                let result = garage.filter(car => {
                    const brandStr = car.brand || "";
                    const modelStr = car.modelName || "";
                    const trimStr = car.trim || "";
                    const query = `${car.year || ''} ${brandStr} ${modelStr} ${trimStr}`.toLowerCase();
                    
                    const matchesSearch = query.includes(garageSearch.toLowerCase());
                    const matchesFavorite = !showOnlyFavorites || car.favorite;

                    let matchesColor = true;
                    if (colorFilter !== 'All Colors') {
                        const carColor = (car.color || '').toLowerCase();
                        const filterColor = colorFilter.toLowerCase();
                        matchesColor = carColor.includes(filterColor);
                    }

                    let matchesLevel = true;
                    if (levelFilter !== 'All Levels') {
                        const resolvedLvl = getCarLevel(car).toLowerCase().trim();
                        const filterLvl = levelFilter.toLowerCase().trim();
                        matchesLevel = resolvedLvl === filterLvl;
                    }

                    return matchesSearch && matchesFavorite && matchesColor && matchesLevel;
                });

                return result.sort((a, b) => {
                    let valA, valB;
                    if (garageSortBy === 'Year') {
                        valA = Number(a.year) || 0;
                        valB = Number(b.year) || 0;
                    } else if (garageSortBy === 'Make') {
                        const makeA = a.brand || "";
                        const makeB = b.brand || "";
                        valA = makeA.toLowerCase();
                        valB = makeB.toLowerCase();
                    } else if (garageSortBy === 'Sell Price') {
                        valA = calculateEstimatedSellPrice(a.cost, a.miles);
                        valB = calculateEstimatedSellPrice(b.cost, b.miles);
                    } else if (garageSortBy === 'HP') {
                        valA = Number(a.horsepower) || 0;
                        valB = Number(b.horsepower) || 0;
                    } else if (garageSortBy === 'Top Speed') {
                        valA = Number(a.topSpeed) || 0;
                        valB = Number(b.topSpeed) || 0;
                    }

                    return sortDirection === 'desc' ? (valA < valB ? 1 : -1) : (valA > valB ? 1 : -1);
                });
            }, [garage, garageSearch, garageSortBy, sortDirection, showOnlyFavorites, colorFilter, levelFilter]);

            const handleDeleteAll = () => {
                setGarage([]);
                localStorage.setItem('gv_cleared', 'true');
                localStorage.setItem('gv_pro_garage_deck_v13', '[]');
                showNotification("Garage cleared permanently.");
            };

            const getLoreForIndex = (index) => {
                const loreArray = [
                    "A masterful presentation of physical mechanics, aerodynamic flow, and pure throttle engagement. Built to satisfy absolute driving focus across complex simulated tarmac runs.",
                    "Underneath the rear decklid lies a beautifully balanced powertrain, delivering instant acceleration boundaries. Suspension components adjust seamlessly to conquer every highway bend.",
                    "The interior cabin layout places paramount attention on physical ergonomics. Instrumentation clusters provide real-time performance tracking without cluttering driver sightlines.",
                    "Sleek visual character lines create low friction coefficient metrics. Every trim choice speaks to rich motorsport legacy, making it a highly valued garage collector asset.",
                    "Advanced weight distribution values optimize turn-in agility. It stands as a profound testament to virtual speed craftsmanship, forever redefining the daily cruising experience."
                ];
                return loreArray[index % loreArray.length];
            };

            const getSubtitleForIndex = (index) => {
                const subTitles = ["ENGINE", "AERODYNAMICS", "DESIGN", "PERFORMANCE", "LEGACY"];
                return subTitles[index % subTitles.length];
            };

            const handleOpenGallery = (car) => {
                setSelectedGalleryCar(car);
                setShowGalleryModal(true);
            };

            const handleDownloadLocalBackup = () => {
                try {
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(garage));
                    const dlAnchorElem = document.createElement('a');
                    dlAnchorElem.setAttribute("href", dataStr);
                    dlAnchorElem.setAttribute("download", `okgarage_backup_${Date.now()}.json`);
                    dlAnchorElem.click();
                    showNotification("Backup saved directly to computer.");
                } catch (e) {
                    console.error("Backup failed: ", e);
                }
            };

            const handleImportLocalFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (Array.isArray(parsed)) {
                            setGarage(parsed);
                            showNotification("Local backup parsed and restored.");
                        } else {
                            showNotification("Invalid file format.");
                        }
                    } catch (err) {
                        showNotification("Incorrect configuration file format.");
                    }
                };
                reader.readAsText(file);
            };

            const handleBulkImageUpload = (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;

                let loadedCount = 0;
                const newImages = [];

                files.forEach((file) => {
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        // Resizes big files down to max 1000px and compresses to 75% quality to save storage
                        const compressed = await compressImage(reader.result, 1000, 1000, 0.75);
                        newImages.push(compressed);
                        loadedCount++;
                        if (loadedCount === files.length) {
                            const updatedGarage = garage.map(c => {
                                if (c.id === selectedGalleryCar.id) {
                                    const prevImages = c.images || [];
                                    const combined = [...prevImages, ...newImages];
                                    const updatedCar = { 
                                        ...c, 
                                        images: combined,
                                        image: c.image || newImages[0] 
                                    };
                                    setSelectedGalleryCar(updatedCar);
                                    return updatedCar;
                                }
                                return c;
                            });
                            setGarage(updatedGarage);
                            showNotification(`Successfully imported and compressed ${newImages.length} images.`);
                        }
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleSelectActiveCover = (imgBase64) => {
                const updatedGarage = garage.map(c => {
                    if (c.id === selectedGalleryCar.id) {
                        const updatedCar = { ...c, image: imgBase64 };
                        setSelectedGalleryCar(updatedCar);
                        return updatedCar;
                    }
                    return c;
                });
                setGarage(updatedGarage);
                showNotification("Primary fleet card cover image updated!");
            };

            const handleDeleteImageFromGallery = (indexToDelete) => {
                const updatedGarage = garage.map(c => {
                    if (c.id === selectedGalleryCar.id) {
                        const prevImages = c.images || [];
                        const combined = prevImages.filter((_, idx) => idx !== indexToDelete);
                        let nextCover = c.image;
                        if (c.image === prevImages[indexToDelete]) {
                            nextCover = combined[0] || "";
                        }
                        const updatedCar = { ...c, images: combined, image: nextCover };
                        setSelectedGalleryCar(updatedCar);
                        return updatedCar;
                    }
                    return c;
                });
                setGarage(updatedGarage);
                showNotification("Image removed from fleet album.");
            };

            const handleAddFrontCardPic = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (event) => {
                    // Compress and resize the cover photo to strictly fit under storage limits
                    const compressed = await compressImage(event.target.result, 800, 800, 0.70);
                    setSampledPicData(compressed);
                    setCurrentCar(prev => ({ ...prev, image: compressed }));
                    showNotification("Front picture uploaded. Click the preview image to extract its hex color!");
                };
                reader.readAsDataURL(file);
            };

            const handleSamplePicClick = (e) => {
                if (!paletteCanvasRef.current) return;
                const canvas = paletteCanvasRef.current;
                const rect = e.target.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * canvas.width;
                const y = ((e.clientY - rect.top) / rect.height) * canvas.height;
                
                try {
                    const ctx = canvas.getContext('2d');
                    const pixel = ctx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;
                    const r = pixel[0];
                    const g = pixel[1];
                    const b = pixel[2];
                    
                    const componentToHex = (c) => {
                        const hex = c.toString(16);
                        return hex.length === 1 ? "0" + hex : hex;
                    };
                    const extractedHex = `#${componentToHex(r)}${componentToHex(g)}${componentToHex(b)}`;
                    
                    setCurrentCar(prev => ({ ...prev, color: extractedHex }));
                    showNotification(`Extracted color ${extractedHex} selected as background!`);
                } catch (err) {
                    console.error("Color sample restriction: ", err);
                }
            };

            // High compatibility adaptive grids
            const garageGridClass = useMemo(() => {
                if (splitOffset < 15) return 'grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5';
                if (splitOffset < 40) return 'grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4';
                return 'grid-cols-1 md:grid-cols-2 xl:grid-cols-3';
            }, [splitOffset]);

            // Fixed Sliding Grid Style (Hides left BVE panel completely if offset goes < 5)
            const gridStyle = useMemo(() => {
                const leftColWidth = splitOffset < 5 ? '0px' : `${splitOffset}%`;
                const rightColWidth = splitOffset > 95 ? '0px' : '1fr';
                return { gridTemplateColumns: `${leftColWidth} 10px ${rightColWidth}` };
            }, [splitOffset]);

            return (
                <div className="w-full h-screen bg-[#07080b] text-white flex flex-col relative select-none overflow-hidden">
                    
                    {/* Dynamic Toast Alert Panel */}
                    {toast.visible && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[150] flex items-center gap-3 px-6 py-3 rounded-full bg-[#181a20]/95 border border-white/10 shadow-[0_12px_40px_rgba(0,0,0,0.85)] transition-all">
                            <div className="w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse" />
                            <span className="text-xs font-semibold text-white/90 tracking-wide">{toast.message}</span>
                        </div>
                    )}

                    {/* Persistent Snapping Reset Toggles */}
                    <div className="fixed top-4 right-10 z-[80] flex items-center gap-3">
                        {splitOffset < 15 && (
                            <button onClick={() => setSplitOffset(50)} className="px-4 py-2 bg-emerald-500/20 hover:bg-emerald-500/30 border border-emerald-500/30 rounded-full text-xs font-bold transition-all text-emerald-400 animate-pulse">
                                Show BVE Registry
                            </button>
                        )}
                        {splitOffset > 85 && (
                            <button onClick={() => setSplitOffset(50)} className="px-4 py-2 bg-red-500/20 hover:bg-red-500/30 border border-red-500/30 rounded-full text-xs font-bold transition-all text-red-400 animate-pulse">
                                Show Garage Fleet
                            </button>
                        )}
                    </div>

                    <header className="w-full max-w-[1720px] mx-auto px-10 pt-8 pb-4 flex justify-between items-center z-10">
                        <div>
                            <h1 className="text-xl font-extrabold tracking-tight font-['Montserrat'] bg-gradient-to-r from-white via-white/80 to-white/60 bg-clip-text text-transparent">Greenville Pro Garage</h1>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={handleDownloadLocalBackup} className="h-10 px-4 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 text-[11px] font-bold text-white/80 transition-colors flex items-center gap-1.5" title="Download backup file directly to computer">
                                📥 Export JSON Data
                            </button>
                            <label className="h-10 px-4 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 text-[11px] font-bold text-white/80 transition-colors flex items-center gap-1.5 cursor-pointer" title="Import database file from local path">
                                📤 Import JSON File
                                <input type="file" accept=".json" onChange={handleImportLocalFile} className="hidden" />
                            </label>

                            <button onClick={handleDeleteAll} className="h-10 px-5 rounded-full bg-red-900/20 hover:bg-red-900/40 border border-red-500/30 text-red-400 text-[13px] font-semibold transition-all">
                                Delete All Vehicles
                            </button>
                            <button onClick={handleOpenAdd} className="h-10 px-6 rounded-full bg-[#181a20] hover:bg-[#20222a] text-white text-[13px] font-semibold border border-white/10 transition-all shadow-md">
                                + Add Vehicle
                            </button>
                        </div>
                    </header>

                    {/* Primary Split Window Workspace */}
                    <div 
                        className="flex-1 w-full max-w-[1720px] mx-auto px-10 pb-10 grid relative select-none min-h-0"
                        style={gridStyle}
                    >
                        
                        {/* LEFT WINDOW: BVE Registry Database */}
                        {splitOffset >= 5 && (
                            <div style={{ gridColumn: '1' }} className="flex flex-col h-full overflow-hidden pr-3">
                                <div className="mb-4 flex flex-wrap justify-between items-end gap-3">
                                    <div>
                                        <h2 className="text-xl font-extrabold font-['Montserrat']">BVE Registry</h2>
                                        <p className="text-xs text-white/40 mt-1 font-medium">showing {filteredBve.length} listings</p>
                                    </div>
                                    <div className="flex items-center gap-2 flex-wrap">
                                        <div className="bg-[#ffffff]/[0.05] rounded-xl p-1 border border-white/[0.06] flex items-center gap-1 h-9 text-xs overflow-x-auto scrollbar-none shrink-0">
                                            {['All', 'L1', 'L2', 'L3', 'L4', 'Permbanned'].map((lvl) => (
                                                <button 
                                                    key={lvl}
                                                    type="button"
                                                    onClick={() => setBveLevelFilter(lvl)}
                                                    className={`px-3 py-1 rounded-[8px] font-medium transition-all whitespace-nowrap ${bveLevelFilter === lvl ? 'bg-white/10 text-white shadow' : 'text-white/50 hover:text-white/80'}`}
                                                >
                                                    {lvl}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="mb-4">
                                    <input 
                                        type="text" 
                                        placeholder="Search banned registry..."
                                        value={bveSearch}
                                        onChange={(e) => setBveSearch(e.target.value)}
                                        className="w-full bg-[#121318] border border-white/[0.05] rounded-xl pl-4 pr-4 py-2.5 text-sm focus:outline-none focus:border-white/15 text-white"
                                    />
                                </div>

                                <div className="flex-1 overflow-y-auto pr-2 space-y-4">
                                    <div className={`grid gap-4 ${splitOffset > 45 ? 'grid-cols-1 xl:grid-cols-3' : 'grid-cols-1 xl:grid-cols-2'}`}>
                                        {filteredBve.map((car, idx) => {
                                            const ownedCar = checkBveOwned(car.name);
                                            const nameWords = car.name.split(' ');
                                            const displayYear = nameWords[0] || "2020";
                                            const displayModelName = nameWords.slice(1).join(' ');

                                            const resolvedLevel = car.level || 'L1';
                                            const badgeStyles = getLevelBadgeStyles(resolvedLevel);

                                            if (ownedCar) {
                                                const spec = getDynamicGradient(ownedCar.color);
                                                const estimatedSell = calculateEstimatedSellPrice(ownedCar.cost, ownedCar.miles);
                                                const isHovered = hoveredBveIndex === idx;

                                                return (
                                                    <div 
                                                        key={`bve-${idx}`}
                                                        onMouseEnter={() => setHoveredBveIndex(idx)}
                                                        onMouseLeave={() => setHoveredBveIndex(null)}
                                                        style={{ background: spec.gradient, borderColor: spec.border }}
                                                        className="group relative rounded-2xl p-5 border transition-all card-transition h-[340px] overflow-hidden shadow-[0_12px_28px_rgba(0,0,0,0.85)] cursor-pointer"
                                                        onClick={() => handleOpenGallery(ownedCar)}
                                                    >
                                                        <div className="relative z-10 pr-1">
                                                            {/* Unified Baseline Text Alignment */}
                                                            <div className="flex gap-6 items-baseline mb-2">
                                                                <div className="flex flex-col">
                                                                    <span className="text-[9px] text-white/40 font-bold uppercase tracking-wider mb-1">Year</span>
                                                                    <span className="text-xs font-bold text-white leading-none">{displayYear}</span>
                                                                </div>
                                                                <div className="flex flex-col flex-1 min-w-0">
                                                                    <span className="text-[9px] text-white/40 font-bold uppercase tracking-wider mb-1">Model</span>
                                                                    <span className="text-xs font-bold text-white leading-none truncate">{displayModelName}</span>
                                                                </div>
                                                                <div className="text-right">
                                                                    <div className="text-[9px] text-white/40 font-bold uppercase tracking-wider mb-0.5">Level</div>
                                                                    <span 
                                                                        style={{ backgroundColor: badgeStyles.bg, color: badgeStyles.text, borderColor: badgeStyles.border, boxShadow: badgeStyles.glow || 'none' }}
                                                                        className="text-[10px] font-bold px-1.5 py-0.5 rounded border uppercase tracking-wider"
                                                                    >
                                                                        {resolvedLevel === 'Level 0' ? '0' : resolvedLevel}
                                                                    </span>
                                                                </div>
                                                            </div>
                                                            <div className="text-[10px] text-white/50 font-bold leading-none mt-1">
                                                                {ownedCar.trim && `Trim: ${ownedCar.trim}`}
                                                            </div>
                                                        </div>

                                                        {/* Transparent background completely removes black/dark grey rectangle tints */}
                                                        {/* Respects Free Space rule by restricting width to 82% and using object-contain */}
                                                        <div className="absolute top-[85px] left-1/2 -translate-x-1/2 pointer-events-none z-0 w-[82%] flex justify-center">
                                                            {ownedCar.image ? (
                                                                <div className="w-full h-[140px] rounded-lg overflow-hidden bg-transparent flex items-center justify-center">
                                                                    <img src={ownedCar.image} alt="active cover" className="w-full h-full object-contain" />
                                                                </div>
                                                            ) : (
                                                                <div className="w-24 h-24 flex items-center justify-center relative">
                                                                    <span className="material-symbols-outlined text-white/10 transform scale-[1.3] select-none">
                                                                        directions_car
                                                                    </span>
                                                                </div>
                                                            )}
                                                        </div>

                                                        {/* Bottom Stats and Tags */}
                                                        <div className="absolute bottom-5 left-5 right-5 z-10 flex flex-col gap-2 bg-transparent">
                                                            <div className="grid grid-cols-2 gap-x-2 pt-1 border-t border-white/[0.04]">
                                                                <div>
                                                                    <span className="text-[10px] text-white/40 font-bold block mb-0.5">
                                                                        {isHovered ? 'Horsepower' : 'Top Speed'}
                                                                    </span>
                                                                    <span className="text-xs font-bold text-white block">
                                                                        {isHovered ? `${ownedCar.horsepower} HP` : `${ownedCar.topSpeed} mph`}
                                                                    </span>
                                                                </div>

                                                                    <span 
                                                                        key={tag} 
                                                                        style={{ backgroundColor: styles.bg, color: styles.text, borderColor: styles.border }}
                                                                        className="text-[10px] px-2.5 py-0.5 rounded-full font-bold border"
                                                                    >
                                                                        {tag}
                                                                    </span>
                                                                );
                                                            })
                                                        ) : (
                                                            <span className="text-[10px] text-white/20 italic">No tags</span>
                                                        )}
                                                    </div>
                                                    {selectedGalleryCar.favorite && (
                                                        <span className="text-[10px] text-[#ffd60a] font-bold">★</span>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Unboxed Giant Alternating Photo Album */}
                                    <div className="w-full flex flex-col">
                                        <div className="flex justify-between items-center mb-10 pb-4 border-b border-white/[0.05]">
                                            <div>
                                                <h4 className="text-xl font-black uppercase tracking-wider font-['Montserrat']">Photo Album ({selectedGalleryCar.images?.length || 0})</h4>
                                                <p className="text-xs text-white/40 font-bold mt-1">STAGGERED HIGH-RESOLUTION FLUID SYSTEM</p>
                                            </div>
                                            <div>
                                                <input 
                                                    ref={bulkFileInputRef}
                                                    type="file" 
                                                    multiple 
                                                    accept="image/*" 
                                                    onChange={handleBulkImageUpload}
                                                    className="hidden" 
                                                />
                                                <button 
                                                    onClick={() => bulkFileInputRef.current?.click()}
                                                    className="px-6 py-3 bg-emerald-500/20 hover:bg-emerald-500/30 border border-emerald-500/30 text-emerald-400 font-bold rounded-2xl text-xs transition-colors shadow-lg"
                                                >
                                                    + Add Photos
                                                </button>
                                            </div>
                                        </div>

                                        {selectedGalleryCar.images && selectedGalleryCar.images.length > 0 ? (
                                            <div className="flex flex-col gap-12 w-full mt-6">
                                                {selectedGalleryCar.images.map((img, idx) => {
                                                    const isEven = idx % 2 === 0;
                                                    const isActive = selectedGalleryCar.image === img;
                                                    return (
                                                        <div 
                                                            key={idx}
                                                            className={`flex flex-col md:flex-row items-center gap-10 w-full ${isEven ? 'md:flex-row' : 'md:flex-row-reverse'}`}
                                                        >
                                                            {/* Large Photo Display Box - Hover Delete Only with beautiful inline SVG Trash icon */}
                                                            <div 
                                                                onClick={() => handleSelectActiveCover(img)}
                                                                className={`relative w-full md:w-[65%] aspect-[16/10] rounded-3xl overflow-hidden border bg-transparent cursor-pointer group/item transition-all ${isActive ? 'border-emerald-500 ring-4 ring-emerald-500/20 scale-[1.01]' : 'border-white/10 hover:border-white/30'}`}
                                                            >
                                                                <img src={img} alt={`album-${idx}`} className="w-full h-full object-cover" />
                                                                
                                                                {/* Slick glassmorphic hover delete button with SVG trash bin (Resolves image_92d086.jpg) */}
                                                                <button 
                                                                    onClick={(e) => {
                                                                        e.stopPropagation();
                                                                        handleDeleteImageFromGallery(idx);
                                                                    }}
                                                                    className="absolute top-4 right-4 w-10 h-10 bg-black/60 hover:bg-red-600/90 border border-white/10 hover:border-red-500/20 rounded-full flex items-center justify-center text-white transition-all duration-200 opacity-0 group-hover/item:opacity-100 shadow-xl z-20"
                                                                    title="Delete Photo"
                                                                >
                                                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2.5" stroke="currentColor" className="w-5 h-5 text-white">
                                                                        <path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                                                                    </svg>
                                                                </button>

                                                                <div className="absolute inset-0 bg-black/40 opacity-0 group-hover/item:opacity-100 flex items-center justify-center transition-all duration-300">
                                                                    <span className="text-xs font-black uppercase tracking-widest text-white bg-black/80 px-4 py-2.5 rounded-xl border border-white/10">Set Cover</span>
                                                                </div>
                                                            </div>

                                                            {/* Photo Details: Clean, Free-Living Text Container with expanded space for more rows */}
                                                            <div className="w-full md:w-[35%] flex flex-col justify-center items-start py-4">
                                                                {/* Custom expanded font subtitle */}
                                                                <h5 className="font-['Montserrat'] tracking-[0.3em] uppercase font-black text-white text-xs mb-3 leading-none">
                                                                    {getSubtitleForIndex(idx)}
                                                                </h5>
                                                                
                                                                {/* Free-living text with expanded max-h to display a lot more rows vertically */}
                                                                <div className="text-[13px] text-white/70 leading-relaxed font-sans tracking-wide overflow-hidden max-h-[280px] text-ellipsis">
                                                                    {getLoreForIndex(idx)}
                                                                    <p className="mt-2 text-[12px] text-white/50 leading-relaxed italic">
                                                                        Continuing along the baseline configurations, this visual profile stands as a testament to the overall performance legacy. The vehicle balance delivers seamless traction across all track test metrics, making this frame one of the absolute highlights within our local fleet index repository.
                                                                    </p>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        ) : (
                                            <div className="h-48 border border-dashed border-white/10 bg-white/[0.01] rounded-2xl flex flex-col items-center justify-center text-center p-6">
                                                <span className="material-symbols-outlined text-white/10 mb-2 scale-125">
                                                    directions_car
                                                </span>
                                                <p className="text-xs text-white/40 font-bold tracking-wider uppercase mb-1">Album empty</p>
                                                <p className="text-[10px] text-white/30 max-w-[180px] leading-relaxed">Use the + Add Photos button to bulk import images.</p>
                                            </div>
                                        )}
                                    </div>

                                </div>

                            </div>
                        );
                    })()}

                    {/* Edit Specs / Properties Dialog */}
                    {showAddEditModal && currentCar && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-md" onClick={() => setShowAddEditModal(false)}></div>
                            
                            <div className="bg-[#121318] border border-white/10 w-full max-w-lg rounded-[28px] z-10 p-6 shadow-2xl relative">
                                <h3 className="text-sm font-black uppercase tracking-widest mb-6 font-['Montserrat'] bg-gradient-to-r from-white to-white/60 bg-clip-text text-transparent">
                                    {currentCar.id ? 'Edit Vehicle Properties' : 'Create New Fleet Vehicle'}
                                </h3>
                                
                                <form onSubmit={handleSaveCar} className="flex flex-col gap-4 overflow-y-auto max-h-[70vh] pr-1">
                                    
                                    {/* Swatch Palette */}
                                    <div className="flex flex-col gap-2">
                                        <label className="text-[10px] text-white/40 uppercase font-black pl-1">Vignette Paint Theme Selection</label>
                                        <div className="grid grid-cols-8 gap-2 mb-1">
                                            {["Red", "Blue", "Green", "Yellow", "Purple", "Gray", "Orange"].map((cName) => {
                                                const dynamicHex = getHexForColorName(cName);
                                                const isSelected = currentCar.color?.toLowerCase() === cName.toLowerCase();
                                                return (
                                                    <button
                                                        type="button"
                                                        key={cName}
                                                        onClick={() => setCurrentCar({ ...currentCar, color: cName })}
                                                        style={{ backgroundColor: dynamicHex }}
                                                        className={`aspect-square rounded-xl border flex items-center justify-center transition-all ${
                                                            isSelected ? 'border-white scale-110 shadow-[0_0_15px_rgba(255,255,255,0.4)]' : 'border-white/10 hover:scale-105'
                                                        }`}
                                                        title={cName}
                                                    >
                                                        {isSelected && <span className="text-[10px] text-white font-bold">✓</span>}
                                                    </button>
                                                );
                                            })}
                                            
                                            <div className="col-span-1 flex items-center justify-center relative">
                                                <input 
                                                    type="color" 
                                                    value={currentCar.color?.startsWith('#') ? currentCar.color : '#5a5f6e'}
                                                    onChange={e => setCurrentCar({ ...currentCar, color: e.target.value })}
                                                    className="absolute inset-0 opacity-0 cursor-pointer w-full h-full"
                                                />
                                                <div className="w-full h-full aspect-square rounded-xl border border-dashed border-white/30 flex items-center justify-center text-[10px] text-white/60 hover:border-white/50 transition-colors">
                                                    Hex
                                                </div>
                                            </div>
                                        </div>

                                        <div className="flex items-center gap-3 bg-white/[0.02] border border-white/5 p-3 rounded-2xl my-1">
                                            <div 
                                                className="w-12 h-12 rounded-xl border border-white/10 flex-shrink-0" 
                                                style={{ background: getDynamicGradient(currentCar.color).gradient }}
                                            />
                                            <div>
                                                <span className="text-[10px] text-white/40 uppercase font-black block">Active Vignette Theme</span>
                                                <span className="text-xs font-semibold text-white/80">{currentCar.color || 'No theme selected'}</span>
                                            </div>
                                        </div>

                                        {/* Color extraction */}
                                        <div className="flex flex-col gap-1.5 mt-2 bg-white/[0.01] border border-white/5 p-3 rounded-2xl">
                                            <div className="flex justify-between items-center">
                                                <span className="text-[9px] text-emerald-400 font-black uppercase tracking-widest font-sans">Sample Color From Front Pic</span>
                                                <label className="px-3 py-1.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-[10px] font-bold cursor-pointer transition-colors text-center">
                                                    Upload Pic
                                                    <input type="file" accept="image/*" onChange={handleAddFrontCardPic} className="hidden" />
                                                </label>
                                            </div>
                                            {sampledPicData && (
                                                <div className="relative mt-2 rounded-xl overflow-hidden border border-white/10 flex flex-col items-center">
                                                    <p className="text-[8px] text-white/40 font-bold mb-1 font-sans">CLICK ON THE IMAGE BELOW TO SAMPLER EXTRACT HEX COLOR:</p>
                                                    <img 
                                                        src={sampledPicData} 
                                                        alt="sampler preview" 
                                                        onClick={handleSamplePicClick} 
                                                        className="max-h-40 object-contain w-full cursor-crosshair hover:opacity-90 transition-opacity"
                                                    />
                                                    <canvas ref={paletteCanvasRef} className="hidden" />
                                                </div>
                                            )}
                                        </div>

                                        <div className="flex flex-col gap-1">
                                            <input 
                                                type="text" 
                                                value={currentCar.color} 
                                                onChange={e => setCurrentCar({ ...currentCar, color: e.target.value })}
                                                className="w-full bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20"
                                                placeholder="Custom paint color value..."
                                            />
                                        </div>
                                    </div>

                                    {/* Tag Selection */}
                                    <div className="flex flex-col gap-2">
                                        <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Toggle Greenville Tags</label>
                                        <div className="grid grid-cols-4 gap-2">
                                            {["Limited", "Off-Sale", "Collectible", "Event"].map(tag => {
                                                const isActive = currentCar.tags?.includes(tag);
                                                const tagStyles = getGreenvilleTagStyles(tag);
                                                
                                                return (
                                                    <button
                                                        type="button"
                                                        key={tag}
                                                        onClick={() => {
                                                            const activeTags = currentCar.tags || [];
                                                            const nextTags = isActive 
                                                                ? activeTags.filter(t => t !== tag)
                                                                : [...activeTags, tag];
                                                            setCurrentCar({ ...currentCar, tags: nextTags });
                                                        }}
                                                        style={{
                                                            backgroundColor: isActive ? tagStyles.bg : 'rgba(255,255,255,0.02)',
                                                            color: isActive ? tagStyles.text : 'rgba(255,255,255,0.3)',
                                                            borderColor: isActive ? tagStyles.text : 'rgba(255,255,255,0.06)',
                                                            boxShadow: isActive ? `0 0 14px ${tagStyles.text}35` : 'none'
                                                        }}
                                                        className="py-2 rounded-xl text-[10px] font-black tracking-wider uppercase border text-center transition-all duration-300"
                                                    >
                                                        {tag}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* Specifications */}
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Brand (Make)</label>
                                            <input required placeholder="e.g. Western" value={currentCar.brand || ""} onChange={e => setCurrentCar({ ...currentCar, brand: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Model Name</label>
                                            <input required placeholder="e.g. Protobunny Easter" value={currentCar.modelName || ""} onChange={e => setCurrentCar({ ...currentCar, modelName: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Trim Configuration</label>
                                            <input placeholder="e.g. XRh" value={currentCar.trim || ""} onChange={e => setCurrentCar({ ...currentCar, trim: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Year</label>
                                            <input placeholder="e.g. 2026" value={currentCar.year || ""} onChange={e => setCurrentCar({ ...currentCar, year: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Odometer Miles</label>
                                            <input type="number" step="any" placeholder="0" value={currentCar.miles} onChange={e => setCurrentCar({ ...currentCar, miles: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Purchase Cost ($)</label>
                                            <input type="number" placeholder="45000" value={currentCar.cost} onChange={e => setCurrentCar({ ...currentCar, cost: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Horsepower (HP)</label>
                                            <input type="number" placeholder="450" value={currentCar.horsepower} onChange={e => setCurrentCar({ ...currentCar, horsepower: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Top Speed (mph)</label>
                                            <input type="number" placeholder="180" value={currentCar.topSpeed} onChange={e => setCurrentCar({ ...currentCar, topSpeed: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20" />
                                        </div>
                                    </div>

                                    <div className="flex gap-2 mt-6 pt-4 border-t border-white/[0.04]">
                                        <button type="button" onClick={() => setShowAddEditModal(false)} className="flex-1 py-3 bg-white/5 hover:bg-white/10 rounded-xl text-xs font-black uppercase tracking-wider">Cancel</button>
                                        <button type="submit" className="flex-1 py-3 bg-emerald-500 hover:bg-emerald-600 text-black rounded-xl text-xs font-black uppercase tracking-wider">Save Properties</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
