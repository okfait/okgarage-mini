            background-color: #07080b;
            margin: 0;
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings:
                'FILL' 0,
                'wght' 600,
                'GRAD' 200,
                'opsz' 48;
            font-size: 54px;
            display: inline-block;
            line-height: 1;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .card-transition {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* Glowing animated levitating spheres keyframes */
        @keyframes floatParticles {
            0% { transform: translateY(100vh) translateX(0) scale(1); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) translateX(100px) scale(0.5); opacity: 0; }
        }
        .ambient-particle {
            position: absolute;
            bottom: -20px;
            background: radial-gradient(circle, var(--particle-color) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatParticles var(--speed) linear infinite;
            pointer-events: none;
        }

        function App() {
            const [garage, setGarage] = useState(() => {
                const cleared = localStorage.getItem('gv_cleared');
                if (cleared === 'true') {
                    return [];
                }
                const saved = localStorage.getItem('gv_pro_garage_deck_v13');
                if (saved) {
                    try { return JSON.parse(saved); } catch (e) { console.error(e); }
                }
                return []; // Strictly empty by default so users can delete and add dynamically!
            });

            useEffect(() => {
                localStorage.setItem('gv_pro_garage_deck_v13', JSON.stringify(garage));
                if (garage.length > 0) {
                    localStorage.removeItem('gv_cleared');
                }
            }, [garage]);

            const [splitOffset, setSplitOffset] = useState(50);
            const [isDragging, setIsDragging] = useState(false);

            const [colorFilter, setColorFilter] = useState('All Colors');

            const [levelFilter, setLevelFilter] = useState('All Levels');
            const [isLevelDropdownOpen, setIsLevelDropdownOpen] = useState(false);

            const [isCustomSelectOpen, setIsCustomSelectOpen] = useState(false);

            // Hover states for stats flip
            const [hoveredCardId, setHoveredCardId] = useState(null);
            const [hoveredBveIndex, setHoveredBveIndex] = useState(null);

            // Context variables
            const [contextMenu, setContextMenu] = useState({ visible: false, x: 0, y: 0, carId: null });
            const [showAddEditModal, setShowAddEditModal] = useState(false);
            const [currentCar, setCurrentCar] = useState(null);
            const [toast, setToast] = useState({ visible: false, message: '' });

            // Immersive detailed overlay
            const [selectedGalleryCar, setSelectedGalleryCar] = useState(null);
            const [showGalleryModal, setShowGalleryModal] = useState(false);
            const bulkFileInputRef = useRef(null);

            // Image sampling context
            const paletteCanvasRef = useRef(null);
            const [sampledPicData, setSampledPicData] = useState(null);

            const showNotification = (msg) => {
                setToast({ visible: true, message: msg });
                setTimeout(() => {
                    setToast(prev => ({ ...prev, visible: false }));
                }, 2500);
            };

            const handleMouseDown = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            useEffect(() => {
                const handleGlobalClickAway = () => {
                    setContextMenu(prev => ({ ...prev, visible: false }));
                };
                window.addEventListener('click', handleGlobalClickAway);
                return () => {
                    window.removeEventListener('click', handleGlobalClickAway);
                };
            }, []);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (!isDragging) return;
                    const rect = document.body.getBoundingClientRect();
                    let pct = (e.clientX / rect.width) * 100;
                    
                    // Standard smooth thresholds
                    if (pct < 5) pct = 0; // Snap cleanly to full screen garage
                    if (pct > 95) pct = 100; // Snap cleanly to full screen BVE Registry
                    
                    setSplitOffset(pct);
                };

                const handleMouseUp = () => {
                    setIsDragging(false);
                };

                if (isDragging) {
                    window.addEventListener('mousemove', handleMouseMove);
                    window.addEventListener('mouseup', handleMouseUp);
                }

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseup', handleMouseUp);
                };
            }, [isDragging]);

            const getCarLevel = (car) => {
                const brandStr = car.brand || "";
                const modelStr = car.modelName || "";
                const fullName = `${car.year || ''} ${brandStr} ${modelStr}`.toLowerCase().trim();

                const match = BANNED_DATABASE.find(b => {
                    const bName = b.name.toLowerCase().trim();
                    return fullName.includes(bName) || bName.includes(fullName);
                });

                if (match) {
                    return match.level;
                }
                
                if (car.level && car.level !== '0' && car.level !== 'Level 0' && car.level !== 'Standard') {
                    return car.level;
                }
                return 'Level 0';
            };

            const getLevelBadgeStyles = (levelValue) => {
                const lvl = (levelValue || '').toUpperCase().trim();
                if (lvl === 'L1' || lvl === 'LEVEL 1') return { bg: 'rgba(16, 185, 129, 0.15)', text: '#10b981', border: 'rgba(16, 185, 129, 0.3)' };
                if (lvl === 'L2' || lvl === 'LEVEL 2') return { bg: 'rgba(245, 158, 11, 0.15)', text: '#f59e0b', border: 'rgba(245, 158, 11, 0.3)' };
                if (lvl === 'L3' || lvl === 'LEVEL 3') return { bg: 'rgba(249, 115, 22, 0.15)', text: '#f97316', border: 'rgba(249, 115, 22, 0.3)' };
                if (lvl === 'L4' || lvl === 'LEVEL 4') return { bg: 'rgba(239, 68, 68, 0.15)', text: '#ef4444', border: 'rgba(239, 68, 68, 0.3)' };
                if (lvl === 'BANNED' || lvl === 'PERMBANNED' || lvl === 'PERM BANNED') {
                    return { bg: 'rgba(127, 29, 29, 0.6)', text: '#ff2222', border: '#ef4444', glow: '0 0 10px rgba(239, 68, 68, 0.8)' };
                }
                return { bg: 'rgba(148, 163, 184, 0.15)', text: '#94a3b8', border: 'rgba(148, 163, 184, 0.3)' };
            };

            // Smoothened Volumetric Spotlight Paint Shader (Correcting b1d160.png perfectly)
            const getDynamicGradient = (colorInput) => {
                const input = (colorInput || "").toLowerCase().trim();
                let r = 30, g = 35, b = 45; // Subtle Slate base

                if (input === 'ruby' || input === 'red' || input === '#c81e32') {
                    r = 180; g = 10; b = 25;
                } else if (input === 'sapphire' || input === 'blue' || input === '#1e50d2') {
                    r = 15; g = 60; b = 180;
                } else if (input === 'green' || input === 'emerald' || input === '#1ea046') {
                    r = 10; g = 140; b = 45;
                } else if (input === 'yellow' || input === 'gold' || input === '#e6c411') {
                    r = 180; g = 140; b = 10;
                } else if (input === 'purple' || input === '#9b59b6') {
                    r = 120; g = 30; b = 180;
                } else if (input === 'orange' || input === '#e67e22') {
                    r = 180; g = 70; b = 10;
                } else if (input.startsWith('#')) {
                    try {
                        const hex = input.replace('#', '');
                        if (hex.length === 6) {
                            r = parseInt(hex.slice(0, 2), 16) || 30;
                            g = parseInt(hex.slice(2, 4), 16) || 35;
                            b = parseInt(hex.slice(4, 6), 16) || 45;
                        }
                    } catch (e) {}
                }

                // Tight center vignette with rapid falloff into deep dark slate at edges
                return {
                    gradient: `radial-gradient(circle at 50% 50%, rgba(${r}, ${g}, ${b}, 0.32) 0%, rgba(${r}, ${g}, ${b}, 0.12) 30%, rgba(7, 8, 11, 1) 72%)`,
                    border: `rgba(${r}, ${g}, ${b}, 0.18)`,
                    rawRGB: `${r}, ${g}, ${b}`
                };
            };

            const getHexForColorName = (name) => {
                const map = {
                    "All Colors": "transparent",
                    "Red": "#ff2a3b",
                    "Blue": "#0a84ff",
                    "Green": "#30d158",
                    "Yellow": "#ffd60a",
                    "Purple": "#bf5af2",
                    "Gray": "#8e8e93",
                    "Orange": "#ff9f0a"
                };
                return map[name] || "transparent";
            };

            const getGreenvilleTagStyles = (tag) => {
                const cleanTag = (tag || "").toLowerCase().trim();
                if (cleanTag === 'limited') {
                    return { bg: 'rgba(255, 214, 10, 0.12)', text: '#ffd60a', border: 'rgba(255, 214, 10, 0.35)' };
                }
                if (cleanTag === 'off-sale') {
                    return { bg: 'rgba(255, 69, 58, 0.12)', text: '#ff453a', border: 'rgba(255, 69, 58, 0.35)' };
                }
                if (cleanTag === 'collectible') {
                    return { bg: 'rgba(10, 132, 255, 0.12)', text: '#0a84ff', border: 'rgba(10, 132, 255, 0.35)' };
                }
                if (cleanTag === 'event') {
                    return { bg: 'rgba(255, 159, 10, 0.12)', text: '#ff9f0a', border: 'rgba(255, 159, 10, 0.35)' };
                }
                return { bg: 'rgba(255, 255, 255, 0.08)', text: '#ffffff', border: 'rgba(255, 255, 255, 0.15)' };
            };

            const calculateEstimatedSellPrice = (cost, miles) => {
                const rawCost = Number(cost) || 0;
                const rawMiles = Number(miles) || 0;
                if (rawCost <= 0) return 0;
                const mileageFactor = Math.max(0.55, 0.85 - (rawMiles * 0.000015));
                return Math.round(rawCost * mileageFactor);
            };

            const handleOpenAdd = () => {
                setCurrentCar({
                    year: new Date().getFullYear().toString(),
                    brand: '',
                    modelName: '',
                    trim: '',
                    color: 'Gray',
                    type: 'Sport',
                    cost: '',
                    miles: '',
                    horsepower: '450',
                    favorite: false,
                    topSpeed: '',
                    engineType: 'Internal Combustion',
                    level: 'Level 0',
                    tags: [],
                    images: []
                });
                setSampledPicData(null);
                setShowAddEditModal(true);
            };

            const handleOpenEdit = (car) => {
                const resolvedLevel = getCarLevel(car);
                setCurrentCar({ 
                    ...car, 
                    level: resolvedLevel,
                    tags: car.tags || [], 
                    images: car.images || [] 
                });
                setSampledPicData(car.image || null);
                setShowAddEditModal(true);
            };

            const handleSaveCar = (e) => {
                e.preventDefault();
                const finalCar = {
                    ...currentCar,
                    id: currentCar.id || Date.now(),
                    cost: Number(currentCar.cost) || 0,
                    miles: Number(currentCar.miles) || 0,
                    horsepower: Number(currentCar.horsepower) || 300,
                    topSpeed: Number(currentCar.topSpeed) || 0,
                    level: currentCar.level || 'Level 0',
                    tags: currentCar.tags || [],
                    images: currentCar.images || []
                };

                if (currentCar.id && garage.some(c => c.id === currentCar.id)) {
                    setGarage(prev => prev.map(c => c.id === currentCar.id ? finalCar : c));
                    showNotification(`Saved changes: ${finalCar.brand} ${finalCar.modelName}`);
                } else {
                    setGarage(prev => [finalCar, ...prev]);
                    showNotification(`Added brand new fleet vehicle: ${finalCar.brand} ${finalCar.modelName}`);
                }
                setShowAddEditModal(false);
                setCurrentCar(null);
                setSampledPicData(null);
            };

            const handleDeleteCar = (id) => {
                setGarage(garage.filter(c => c.id !== id));
                showNotification("Fleet vehicle permanently deleted.");
            };

            const handleToggleFavorite = (id) => {
                setGarage(garage.map(c => c.id === id ? { ...c, favorite: !c.favorite } : c));
            };

            const handleContextMenu = (e, carId) => {
                e.preventDefault();
                e.stopPropagation();
                setContextMenu({ visible: true, x: e.clientX, y: e.clientY, carId });
            };

            const checkBveOwned = (bveCarName) => {
                const bveWords = bveCarName.toLowerCase();
                return garage.find(g => {
                    const gName = `${g.year || ''} ${g.brand || ''} ${g.modelName || ''}`.toLowerCase().trim();
                    return bveWords.includes(gName) || gName.includes(bveWords);
                });
            };

            const filteredBve = useMemo(() => {
                return BANNED_DATABASE.filter(car => {
                    const matchesSearch = car.name.toLowerCase().includes(bveSearch.toLowerCase());
                    const matchesLevel = bveLevelFilter === 'All' || car.level.toLowerCase() === bveLevelFilter.toLowerCase();
                    return matchesSearch && matchesLevel;
                });
            }, [bveSearch, bveLevelFilter]);

            const sortedGarage = useMemo(() => {
                let result = garage.filter(car => {
                    const brandStr = car.brand || "";
                    const modelStr = car.modelName || "";
                    const trimStr = car.trim || "";
                    const query = `${car.year || ''} ${brandStr} ${modelStr} ${trimStr}`.toLowerCase();
                    
                    const matchesSearch = query.includes(garageSearch.toLowerCase());
                    const matchesFavorite = !showOnlyFavorites || car.favorite;

                    let matchesColor = true;
                    if (colorFilter !== 'All Colors') {
                        const carColor = (car.color || '').toLowerCase();
                        const filterColor = colorFilter.toLowerCase();
                        matchesColor = carColor.includes(filterColor);
                    }

                    let matchesLevel = true;
                    if (levelFilter !== 'All Levels') {
                        const resolvedLvl = getCarLevel(car).toLowerCase().trim();
                        const filterLvl = levelFilter.toLowerCase().trim();
                        matchesLevel = resolvedLvl === filterLvl;
                    }

                    return matchesSearch && matchesFavorite && matchesColor && matchesLevel;
                });

                return result.sort((a, b) => {
                    let valA, valB;
                    if (garageSortBy === 'Year') {
                        valA = Number(a.year) || 0;
                        valB = Number(b.year) || 0;
                    } else if (garageSortBy === 'Make') {
                        const makeA = a.brand || "";
                        const makeB = b.brand || "";
                        valA = makeA.toLowerCase();
                        valB = makeB.toLowerCase();
                    } else if (garageSortBy === 'Sell Price') {
                        valA = calculateEstimatedSellPrice(a.cost, a.miles);
                        valB = calculateEstimatedSellPrice(b.cost, b.miles);
                    } else if (garageSortBy === 'HP') {
                        valA = Number(a.horsepower) || 0;
                        valB = Number(b.horsepower) || 0;
                    } else if (garageSortBy === 'Top Speed') {
                        valA = Number(a.topSpeed) || 0;
                        valB = Number(b.topSpeed) || 0;
                    }

                    return sortDirection === 'desc' ? (valA < valB ? 1 : -1) : (valA > valB ? 1 : -1);
                });
            }, [garage, garageSearch, garageSortBy, sortDirection, showOnlyFavorites, colorFilter, levelFilter]);

                setGarage([]);
                localStorage.setItem('gv_cleared', 'true');

                let loadedCount = 0;
                const newImages = [];

                files.forEach((file) => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        newImages.push(reader.result);
                        loadedCount++;
                        if (loadedCount === files.length) {
                            const updatedGarage = garage.map(c => {
                                if (c.id === selectedGalleryCar.id) {
                                    const prevImages = c.images || [];
                                    const combined = [...prevImages, ...newImages];
                                    const updatedCar = { 
                                        ...c, 
                                        images: combined,
                                        image: c.image || newImages[0] 
                                    };
                                    setSelectedGalleryCar(updatedCar);
                                    return updatedCar;
                                }
                                return c;

                            setGarage(updatedGarage);
                            showNotification(`Successfully imported ${newImages.length} fleet image assets.`);

                    reader.readAsDataURL(file);

                const canvas = paletteCanvasRef.current;
                const rect = e.target.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * canvas.width;
                const y = ((e.clientY - rect.top) / rect.height) * canvas.height;
                
                try {
                    const ctx = canvas.getContext('2d');
                    const pixel = ctx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;
                    const r = pixel[0];
                    const g = pixel[1];
                    const b = pixel[2];
                    
                    const componentToHex = (c) => {
                        const hex = c.toString(16);
                        return hex.length === 1 ? "0" + hex : hex;
                    };
                    const extractedHex = `#${componentToHex(r)}${componentToHex(g)}${componentToHex(b)}`;
                    
                    setCurrentCar(prev => ({ ...prev, color: extractedHex }));
                    showNotification(`Extracted color ${extractedHex} selected as background!`);
                } catch (err) {
                    console.error("Color sample restriction: ", err);
                }
            };

                    const ctx = canvas.getContext('2d');
                    const img = new Image();
                    img.onload = () => {
                        canvas.width = img.naturalWidth || 400;
                        canvas.height = img.naturalHeight || 300;

            return (

                    {/* Dynamic Toast Alert Panel */}

                            <div className="w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse" />
                            <span className="text-xs font-semibold text-white/90 tracking-wide">{toast.message}</span>
                        </div>

                    {/* Persistent Snapping Reset Toggles (Resolving image_3aa104.png completely) */}
                    <div className="fixed top-4 right-10 z-[80] flex items-center gap-3">
                        {splitOffset < 15 && (
                            <button onClick={() => setSplitOffset(50)} className="px-4 py-2 bg-emerald-500/20 hover:bg-emerald-500/30 border border-emerald-500/30 rounded-full text-xs font-bold transition-all text-emerald-400 animate-pulse">
                                Show BVE Registry
                            </button>

                        {splitOffset > 85 && (
                            <button onClick={() => setSplitOffset(50)} className="px-4 py-2 bg-red-500/20 hover:bg-red-500/30 border border-red-500/30 rounded-full text-xs font-bold transition-all text-red-400 animate-pulse">
                                Show Garage Fleet
                            </button>

                    </div>

                    <header className="w-full max-w-[1720px] mx-auto px-10 pt-8 pb-4 flex justify-between items-center z-10">
                        <div>
                            <h1 className="text-xl font-extrabold tracking-tight font-['Montserrat'] bg-gradient-to-r from-white via-white/80 to-white/60 bg-clip-text text-transparent">Greenville Pro Garage</h1>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={handleDeleteAll} className="h-10 px-5 rounded-full bg-red-900/20 hover:bg-red-900/40 border border-red-500/30 text-red-400 text-[13px] font-semibold transition-all">
                                Delete All Vehicles
                            </button>
                            <button onClick={handleOpenAdd} className="h-10 px-6 rounded-full bg-[#181a20] hover:bg-[#20222a] text-white text-[13px] font-semibold border border-white/10 transition-all shadow-md">
                                + Add Vehicle
                            </button>
                        </div>
                    </header>

                    {/* Primary Split Window Workspace (Locked with explicit column spans to prevent black screen image_3aa104.png) */}
                    <div 
                        className="flex-1 w-full max-w-[1720px] mx-auto px-10 pb-10 grid relative select-none min-h-0"
                        style={gridStyle}
                    >
                        
                        {/* LEFT WINDOW: BVE Registry Database (Conditionally hides completely on layout drag < 15) */}

                                        <h2 className="text-xl font-extrabold font-['Montserrat']">BVE Registry</h2>

                                            {['All', 'L1', 'L2', 'L3', 'L4', 'Permbanned'].map((lvl) => (

                                    <input

                                        {filteredBve.map((car, idx) => {
                                            const ownedCar = checkBveOwned(car.name);

                                            const displayYear = nameWords[0] || "2020";

                                            const resolvedLevel = car.level || 'L1';

                                                const estimatedSell = calculateEstimatedSellPrice(ownedCar.cost, ownedCar.miles);
                                                const isHovered = hoveredBveIndex === idx;

                                                return (

                                                        className="group relative rounded-2xl p-5 border transition-all card-transition h-[250px] overflow-hidden shadow-[0_12px_28px_rgba(0,0,0,0.85)] cursor-pointer"
                                                        onClick={() => handleOpenGallery(ownedCar)}
                                                    >

                                                                <div className="col-span-1">
                                                                    <div className="text-[9px] text-white/40 font-bold uppercase tracking-wider mb-0.5">Model</div>
                                                                    <div className="text-xs font-semibold text-white break-words leading-tight">{displayModelName}</div>

                                                                    <div className="text-[9px] text-white/40 font-bold uppercase tracking-wider mb-0.5">Level</div>
                                                                    <span

                                                                        className="text-[10px] font-bold px-1.5 py-0.5 rounded border uppercase tracking-wider"
                                                                    >
                                                                        {resolvedLevel}
                                                                    </span>

                                                            {/* Trim underneath to lock layout */}
                                                            <div className="text-[10px] text-white/50 font-bold leading-none mt-1">
                                                                {ownedCar.trim && `Trim: ${ownedCar.trim}`}

                                                                directions_car

                                                            <div className="grid grid-cols-2 gap-x-2 pt-1 border-t border-white/[0.04]">

                                                                        {isHovered ? 'Horsepower' : 'Top Speed'}

                                                                        {isHovered ? `${ownedCar.horsepower} HP` : `${ownedCar.topSpeed} kmh`}

                                                                                    {tag}

                                            {}

                                                >

                                                        className="text-[10px] font-bold px-2 py-0.5 rounded border uppercase tracking-wider shrink-0"
                                                    >
                                                        {resolvedLevel}
                                                    </span>
                                                </div>
                                            );
                                        })}

                                </div>

                        {/* WORKSPACE SEPARATOR HANDLE (Always visible and interactive to prevent slide collapses) */}

                            <div className={`w-[2px] h-[95%] bg-white/[0.08] hover:bg-emerald-500/50 transition-all ${isDragging ? 'bg-emerald-500' : ''}`} />

                        {/* RIGHT WINDOW: Owned Vehicle Fleet Deck (Takes up 100% space if slider collapses to left < 15) */}
                        {splitOffset <= 95 && (

                                                        {isSelected && <span className="text-[10px] text-white font-bold">✓</span>}
                                                    </button>
                                                );
                                            })}
                                            
                                            {/* Hex Color Picker Option swatch */}
                                            <div className="col-span-1 flex items-center justify-center relative">
                                                <input 
                                                    type="color" 
                                                    value={currentCar.color?.startsWith('#') ? currentCar.color : '#5a5f6e'}
                                                    onChange={e => setCurrentCar({ ...currentCar, color: e.target.value })}
                                                    className="absolute inset-0 opacity-0 cursor-pointer w-full h-full"
                                                />
                                                <div className="w-full h-full aspect-square rounded-xl border border-dashed border-white/30 flex items-center justify-center text-[10px] text-white/60 hover:border-white/50 transition-colors">
                                                    Hex
                                                </div>
                                            </div>
                                        </div>

                                        {/* Live color vignette swatch preview block */}
                                        <div className="flex items-center gap-3 bg-white/[0.02] border border-white/5 p-3 rounded-2xl my-1">
                                            <div 
                                                className="w-12 h-12 rounded-xl border border-white/10 flex-shrink-0" 
                                                style={{ background: getDynamicGradient(currentCar.color).gradient }}
                                            />
                                            <div>
                                                <span className="text-[10px] text-white/40 uppercase font-black block">Active Vignette Theme</span>
                                                <span className="text-xs font-semibold text-white/80">{currentCar.color || 'No theme selected'}</span>
                                            </div>
                                        </div>

                                        {/* Picture Color Extraction Canvas block */}
                                        <div className="flex flex-col gap-1.5 mt-2 bg-white/[0.01] border border-white/5 p-3 rounded-2xl">
                                            <div className="flex justify-between items-center">
                                                <span className="text-[9px] text-emerald-400 font-black uppercase tracking-widest font-sans">Sample Color From Front Pic</span>
                                                <label className="px-3 py-1.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-[10px] font-bold cursor-pointer transition-colors text-center">
                                                    Upload Pic
                                                    <input type="file" accept="image/*" onChange={handleAddFrontCardPic} className="hidden" />
                                                </label>
                                            </div>
                                            {sampledPicData && (
                                                <div className="relative mt-2 rounded-xl overflow-hidden border border-white/10 flex flex-col items-center">
                                                    <p className="text-[8px] text-white/40 font-bold mb-1 font-sans">CLICK ON THE IMAGE BELOW TO SAMPLER EXTRACT HEX COLOR:</p>
                                                    <img 
                                                        src={sampledPicData} 
                                                        alt="sampler preview" 
                                                        onClick={handleSamplePicClick} 
                                                        className="max-h-40 object-contain w-full cursor-crosshair hover:opacity-90 transition-opacity"
                                                    />
                                                    {/* Hidden color extraction renderer canvas */}
                                                    <canvas ref={paletteCanvasRef} className="hidden" />
                                                </div>
                                            )}
                                        </div>

                                        <div className="flex flex-col gap-1">
                                            <input 
                                                type="text" 
                                                value={currentCar.color} 
                                                onChange={e => setCurrentCar({ ...currentCar, color: e.target.value })}
                                                className="w-full bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20"
                                                placeholder="Custom paint color value..."
                                            />
                                        </div>
                                    </div>

                                    {/* Tag Selection Row */}
                                    <div className="flex flex-col gap-2">
                                        <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Toggle Greenville Tags</label>
                                        <div className="grid grid-cols-4 gap-2">
                                            {["Limited", "Off-Sale", "Collectible", "Event"].map(tag => {
                                                const isActive = currentCar.tags?.includes(tag);
                                                const tagStyles = getGreenvilleTagStyles(tag);
                                                
                                                return (
                                                    <button
                                                        type="button"
                                                        key={tag}
                                                        onClick={() => {
                                                            const activeTags = currentCar.tags || [];
                                                            const nextTags = isActive 
                                                                ? activeTags.filter(t => t !== tag)
                                                                : [...activeTags, tag];
                                                            setCurrentCar({ ...currentCar, tags: nextTags });
                                                        }}
                                                        style={{
                                                            backgroundColor: isActive ? tagStyles.bg : 'rgba(255,255,255,0.02)',
                                                            color: isActive ? tagStyles.text : 'rgba(255,255,255,0.3)',
                                                            borderColor: isActive ? tagStyles.text : 'rgba(255,255,255,0.06)',
                                                            boxShadow: isActive ? `0 0 14px ${tagStyles.text}35` : 'none'
                                                        }}
                                                        className="py-2 rounded-xl text-[10px] font-black tracking-wider uppercase border text-center transition-all duration-300"
                                                    >
                                                        {tag}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* Specifications Input Grid */}
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Brand (Make)</label>
                                            <input required placeholder="e.g. Western" value={currentCar.brand || ""} onChange={e => setCurrentCar({ ...currentCar, brand: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Model Name</label>
                                            <input required placeholder="e.g. Protobunny Easter" value={currentCar.modelName || ""} onChange={e => setCurrentCar({ ...currentCar, modelName: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Trim Configuration</label>
                                            <input placeholder="e.g. XRh" value={currentCar.trim || ""} onChange={e => setCurrentCar({ ...currentCar, trim: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Year</label>
                                            <input placeholder="e.g. 2026" value={currentCar.year || ""} onChange={e => setCurrentCar({ ...currentCar, year: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Odometer Miles</label>
                                            <input type="number" step="any" placeholder="0" value={currentCar.miles} onChange={e => setCurrentCar({ ...currentCar, miles: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Purchase Cost ($)</label>
                                            <input type="number" placeholder="45000" value={currentCar.cost} onChange={e => setCurrentCar({ ...currentCar, cost: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Horsepower (HP)</label>
                                            <input type="number" placeholder="450" value={currentCar.horsepower} onChange={e => setCurrentCar({ ...currentCar, horsepower: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Top Speed (kmh)</label>
                                            <input type="number" placeholder="180" value={currentCar.topSpeed} onChange={e => setCurrentCar({ ...currentCar, topSpeed: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20" />
                                        </div>

                                        {/* Custom Level Dropdown */}
                                        <div className="flex flex-col gap-1 col-span-2 relative">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">BVE Level Categorization</label>
                                            
                                            <div 
                                                onClick={() => setIsCustomSelectOpen(!isCustomSelectOpen)}
                                                className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white flex justify-between items-center cursor-pointer hover:border-white/10 transition-colors"
                                            >
                                                <span>{currentCar.level || 'Level 0'}</span>
                                                <span className="text-[10px] text-white/40">{isCustomSelectOpen ? '▲' : '▼'}</span>
                                            </div>

                                            {isCustomSelectOpen && (
                                                <div className="absolute top-[102%] left-0 w-full bg-[#18181c] border border-white/10 rounded-xl p-1 shadow-2xl z-50 flex flex-col max-h-48 overflow-y-auto">
                                                    {["Level 0", "Level 1 (L1)", "Level 2 (L2)", "Level 3 (L3)", "Level 4 (L4)", "Permbanned"].map(lvlOpt => (
                                                        <div
                                                            key={lvlOpt}
                                                            onClick={() => {
                                                                const mapping = {
                                                                    "Level 0": "Level 0",
                                                                    "Level 1 (L1)": "L1",
                                                                    "Level 2 (L2)": "L2",
                                                                    "Level 3 (L3)": "L3",
                                                                    "Level 4 (L4)": "L4",
                                                                    "Permbanned": "Permbanned"
                                                                };
                                                                setCurrentCar({ ...currentCar, level: mapping[lvlOpt] });
                                                                setIsCustomSelectOpen(false);
                                                            }}
                                                            className="px-4 py-2 hover:bg-white/10 rounded-lg text-xs font-semibold cursor-pointer transition-colors text-white break-words whitespace-normal"
                                                        >
                                                            {lvlOpt}
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="flex gap-2 mt-6 pt-4 border-t border-white/[0.04]">
                                        <button type="button" onClick={() => setShowAddEditModal(false)} className="flex-1 py-3 bg-white/5 hover:bg-white/10 rounded-xl text-xs font-black uppercase tracking-wider">Cancel</button>
                                        <button type="submit" className="flex-1 py-3 bg-emerald-500 hover:bg-emerald-600 text-black rounded-xl text-xs font-black uppercase tracking-wider">Save Properties</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
