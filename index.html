        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Inter", sans-serif;
            background-color: #07080b;
            margin: 0;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .card-transition {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* Floating sphere animations */
        @keyframes floatSpheres {
            0% { transform: translateY(110%) translateX(0) scale(1); opacity: 0; }
            20% { opacity: var(--max-opacity, 0.35); }
            85% { opacity: var(--max-opacity, 0.35); }
            100% { transform: translateY(-110%) translateX(45px) scale(0.5); opacity: 0; }
        }
        .gravity-sphere {
            position: absolute;
            bottom: -20px;
            background: radial-gradient(circle, var(--sphere-color, rgba(16, 185, 129, 0.45)) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatSpheres var(--duration, 10s) ease-in-out infinite;
            animation-delay: var(--delay, 0s);
            pointer-events: none;
            z-index: 1;
        }

        /* Staggered card entry animations */
        @keyframes cascadeIn {
            0% { opacity: 0; transform: translateY(15px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .staggered-card {
            animation: cascadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Fluid modal window transitions */
        @keyframes modalEntrance {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes modalExit {
            0% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(0.95) translateY(10px); }
        }
        .modal-active {
            animation: modalEntrance 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .modal-closing {
            animation: modalExit 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes dropdownEntrance {
            0% { opacity: 0; transform: translateY(-6px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .dropdown-active {
            animation: dropdownEntrance 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        const compressBase64 = (base64Str, maxWidth = 640, maxHeight = 480, quality = 0.85) => {
            return new Promise((resolve) => {
                if (!base64Str || !base64Str.startsWith("data:image")) {
                    resolve(base64Str);
                    return;
                }
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                    if (height > maxHeight) {
                        width = Math.round((width * maxHeight) / height);
                        height = maxHeight;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');

                    // Draw on a transparent canvas first (no white fill yet) so we
                    // can check whether the source image actually has any see-through
                    // pixels. Car cutout renders (like the Canva-edited PNGs used for
                    // card covers) do; in-game gallery screenshots don't.
                    ctx.clearRect(0, 0, width, height);
                    ctx.drawImage(img, 0, 0, width, height);

                    let hasTransparency = false;
                    try {
                        const { data } = ctx.getImageData(0, 0, width, height);
                        for (let i = 3; i < data.length; i += 4) {
                            if (data[i] < 255) { hasTransparency = true; break; }
                        }
                    } catch (e) {
                        // Canvas got tainted (rare cross-origin case) -- just treat
                        // it as opaque and fall back to JPEG below.
                        hasTransparency = false;
                    }

                    if (hasTransparency) {
                        // Keep the transparent background intact. PNG is the only
                        // format here with an alpha channel, so use it for these --
                        // it's larger than JPEG, but that's the tradeoff for not
                        // flattening a transparent cutout onto solid white.
                        resolve(canvas.toDataURL('image/png'));
                    } else {
                        // No transparency to protect, so JPEG is safe here and
                        // compresses photographic car screenshots far smaller than
                        // PNG would. Composite white behind the drawn pixels first
                        // since JPEG has no alpha channel.
                        ctx.globalCompositeOperation = 'destination-over';
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    }
                };
                img.onerror = () => resolve(base64Str);
            });
        };

        // Rough size estimate (bytes) of a base64 data URL string
        const estimateBase64Bytes = (str) => {
            if (!str) return 0;
            const commaIdx = str.indexOf(',');
            const data = commaIdx >= 0 ? str.slice(commaIdx + 1) : str;
            return Math.round(data.length * 0.75);
        };

        // IndexedDB storage layer.

        // localStorage caps out around 5-10MB per site, which is nowhere near
        // enough for ~120 cars with cover photos + galleries -- that's what was
        // silently truncating the garage back down to one car on reload. This
        // switches the actual car data over to IndexedDB, which browsers grant
        // hundreds of MB (often a % of free disk space) to. It's still 100%
        // local/offline storage living on your computer -- nothing leaves the
        // browser -- it's just a bigger, more reliable bucket than localStorage.
        // ---------------------------------------------------------------------
        const IDB_DB_NAME = 'okgarage_mini_db';
        const IDB_STORE_NAME = 'kv';

        const idbOpen = () => {
            return new Promise((resolve, reject) => {
                if (!window.indexedDB) {
                    reject(new Error("IndexedDB unsupported in this browser"));
                    return;
                }
                const req = indexedDB.open(IDB_DB_NAME, 1);
                req.onupgradeneeded = () => {
                    if (!req.result.objectStoreNames.contains(IDB_STORE_NAME)) {
                        req.result.createObjectStore(IDB_STORE_NAME);
                    }
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        };

        const idbGet = async (key) => {
            const db = await idbOpen();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(IDB_STORE_NAME, 'readonly');
                const req = tx.objectStore(IDB_STORE_NAME).get(key);
                req.onsuccess = () => resolve(req.result === undefined ? null : req.result);
                req.onerror = () => reject(req.error);
            });
        };

        const idbSet = async (key, value) => {
            const db = await idbOpen();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(IDB_STORE_NAME, 'readwrite');
                tx.objectStore(IDB_STORE_NAME).put(value, key);
                tx.oncomplete = () => resolve(true);
                tx.onerror = () => reject(tx.error);
            });
        };

        const idbDelete = async (key) => {
            const db = await idbOpen();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(IDB_STORE_NAME, 'readwrite');
                tx.objectStore(IDB_STORE_NAME).delete(key);
                tx.oncomplete = () => resolve(true);
                tx.onerror = () => reject(tx.error);

        // "okgarage" watermark logo, used on downloaded card/photo exports.
        //
        // Loaded once via fetch()+blob rather than a plain <img crossOrigin>:
        // once it's turned into a blob: URL it's same-origin as far as the
        // canvas is concerned, so exporting the canvas afterward (toBlob/
        // toDataURL) never throws a "tainted canvas" security error, regardless
        // of GitHub's own CORS headers. Using the direct raw.githubusercontent.com
        // URL (rather than the github.com "blob" page + ?raw=true redirect)
        // since it's the one guaranteed to send proper CORS headers.
        // ---------------------------------------------------------------------
        const OK_LOGO_URL = 'https://raw.githubusercontent.com/okfait/okgarage-mini/main/ok%20(27).png';
        let cachedLogoImgPromise = null;

        const loadOkLogo = () => {
            if (cachedLogoImgPromise) return cachedLogoImgPromise;
            const attempt = (async () => {
                const response = await fetch(OK_LOGO_URL, { mode: 'cors' });
                if (!response.ok) throw new Error("Failed to fetch OK logo: " + response.status);
                const blob = await response.blob();
                const objectUrl = URL.createObjectURL(blob);
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = () => reject(new Error("Failed to decode OK logo image"));
                    img.src = objectUrl;
                });
            })();
            // Don't cache a failed attempt -- let the next save retry the fetch
            // instead of being stuck forever after one transient network blip.
            attempt.catch(() => { cachedLogoImgPromise = null; });
            cachedLogoImgPromise = attempt;
            return cachedLogoImgPromise;
        };

        // Draws the OK logo bottom-right of a canvas: inset from the corner
        // (never touching it), semi-transparent, with a soft white glow behind
        // it so the black logo stands out against dark car photos/cards.
        const drawOkWatermark = (ctx, canvasWidth, canvasHeight, logoImg) => {
            const targetWidth = Math.round(canvasWidth * 0.16);
            const targetHeight = Math.round(targetWidth * (logoImg.height / logoImg.width));
            const margin = Math.round(canvasWidth * 0.035);
            const x = canvasWidth - targetWidth - margin;
            const y = canvasHeight - targetHeight - margin;

            ctx.save();
            ctx.globalAlpha = 0.55;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.95)';
            ctx.shadowBlur = Math.round(canvasWidth * 0.03);
            ctx.drawImage(logoImg, x, y, targetWidth, targetHeight);
            ctx.restore();
        };

        // Triggers a browser download for a canvas, saved as a PNG file.
        const downloadCanvasAsPng = (canvas, filename) => {
            canvas.toBlob((blob) => {
                if (!blob) return;
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            }, 'image/png');
        };

        // Loads any image source (data URL, blob URL, etc.) into an <img>,
        // resolving once it's decoded and ready to draw onto a canvas.
        const loadImageEl = (src) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error("Failed to load image"));
                img.src = src;
            });
        };

        // Rounded-rect path helper (drawn manually for broad browser support).
        const traceRoundedRectPath = (ctx, x, y, width, height, radius) => {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.arcTo(x + width, y, x + width, y + height, radius);
            ctx.arcTo(x + width, y + height, x, y + height, radius);
            ctx.arcTo(x, y + height, x, y, radius);
            ctx.arcTo(x, y, x + width, y, radius);
            ctx.closePath();
        };

        function RevealOnScroll({ children }) {
            const [isVisible, setIsVisible] = useState(false);
            const domRef = useRef();

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                        }
                    });
                }, { threshold: 0.1 });
                
                if (domRef.current) {
                    observer.observe(domRef.current);
                }
                return () => {
                    if (domRef.current && observer) observer.disconnect();
                }
            }, []);

            return (
                <div 
                    ref={domRef} 
                    className={`transition-all duration-[1000ms] transform ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}`}
                >
                    {children}
                </div>
            );
        }

                                // everything in localStorage. If that's all we find, load

                                    loadedGarage = JSON.parse(primarySaved);

                                    for (const key of FALLBACK_KEYS) {

                                                    let modelName = car.modelName || "";

                                        await idbSet(PRIMARY_STORAGE_KEY, loadedGarage);

            // A plain substring check misses those entirely, which is why some
            // owned cars were showing as "Level 0" even though they're clearly on
            // the list. This does a word-by-word comparison and tolerates a couple
            // of character differences per word, so near-matches still count.
            // ---------------------------------------------------------------------
            const normalizeBveName = (str) => (str || "")
                .toLowerCase()
                .replace(/[^a-z0-9\s]/g, ' ')
                .replace(/\s+/g, ' ')

            const levenshteinDistance = (a, b) => {
                const dp = Array.from({ length: a.length + 1 }, () => new Array(b.length + 1).fill(0));
                for (let i = 0; i <= a.length; i++) dp[i][0] = i;
                for (let j = 0; j <= b.length; j++) dp[0][j] = j;
                for (let i = 1; i <= a.length; i++) {
                    for (let j = 1; j <= b.length; j++) {
                        if (a[i - 1] === b[j - 1]) {
                            dp[i][j] = dp[i - 1][j - 1];
                        } else {
                            dp[i][j] = 1 + Math.min(dp[i - 1][j - 1], dp[i - 1][j], dp[i][j - 1]);
                        }
                    }
                }
                return dp[a.length][b.length];
            };

            // Two words "match" if identical, or close enough (small edit distance
            // relative to word length) to catch a typo without over-matching.
            const wordsFuzzyMatch = (w1, w2) => {
                if (w1 === w2) return true;
                if (w1.length < 3 || w2.length < 3) return false;
                const dist = levenshteinDistance(w1, w2);
                const maxLen = Math.max(w1.length, w2.length);
                return dist <= Math.max(1, Math.floor(maxLen * 0.25));
            };

            // Checks whether (most of) the shorter name's words show up, possibly
            // fuzzily, in the other name. Used as a fallback when a direct
            // substring match fails.
            const namesFuzzyMatch = (nameA, nameB) => {
                const wordsA = normalizeBveName(nameA).split(' ').filter(Boolean);
                const wordsB = normalizeBveName(nameB).split(' ').filter(Boolean);
                if (wordsA.length === 0 || wordsB.length === 0) return false;
                const shorter = wordsA.length <= wordsB.length ? wordsA : wordsB;
                const longer = shorter === wordsA ? wordsB : wordsA;

                let matched = 0;
                const usedIdx = new Set();
                shorter.forEach(w => {
                    for (let i = 0; i < longer.length; i++) {
                        if (usedIdx.has(i)) continue;
                        if (wordsFuzzyMatch(w, longer[i])) {
                            matched++;
                            usedIdx.add(i);
                            break;
                        }
                    }
                });
                return (matched / shorter.length) >= 0.8;
            };

                if (lvl === 'L3' || lvl === 'LEVEL 3') return { bg: 'rgba(249, 115, 22, 0.15)', text: '#f97316', border: 'rgba(249, 115, 22, 0.3)' };

                let targetColor = input;
                if (matchedInPalette) {
                    targetColor = matchedInPalette.hex.toLowerCase();

                if (targetColor === 'ruby' || targetColor === 'red' || targetColor === '#c81e32' || targetColor === '#ff2a3b') {
                    r = 200; g = 30; b = 50;
                } else if (targetColor === 'sapphire' || targetColor === 'blue' || targetColor === '#1e50d2' || targetColor === '#0a84ff') {

                    let matchesColor = true;

                        const carColor = (car.color || '').toLowerCase();
                        const filterColor = colorFilter.toLowerCase();
                        matchesColor = carColor.includes(filterColor);
                    }

                    let matchesLevel = true;
                    if (levelFilter !== 'All Levels') {
                        const resolvedLvl = getCarLevel(car).toLowerCase().trim();
                        const filterLvl = levelFilter.toLowerCase().trim();
                        matchesLevel = resolvedLvl === filterLvl;
                    }

                    return matchesSearch && matchesFavorite && matchesColor && matchesLevel;
                });

                return result.sort((a, b) => {
                    let valA, valB;
                    if (garageSortBy === 'Year') {
                        valA = Number(a.year) || 0;
                        valB = Number(b.year) || 0;
                    } else if (garageSortBy === 'Make') {
                        const makeA = a.brand || "";
                        const makeB = b.brand || "";
                        valA = makeA.toLowerCase();
                        valB = makeB.toLowerCase();
                    } else if (garageSortBy === 'Sell Price') {
                        valA = calculateEstimatedSellPrice(a.cost, a.miles);
                        valB = calculateEstimatedSellPrice(b.cost, b.miles);
                    } else if (garageSortBy === 'HP') {
                        valA = Number(a.horsepower) || 0;
                        valB = Number(b.horsepower) || 0;
                    } else if (garageSortBy === 'Top Speed') {
                        valA = Number(a.topSpeed) || 0;
                        valB = Number(b.topSpeed) || 0;
                    }

                    return sortDirection === 'desc' ? (valA < valB ? 1 : -1) : (valA > valB ? 1 : -1);
                });
            }, [garage, garageSearch, garageSortBy, sortDirection, showOnlyFavorites, colorFilter, levelFilter, activeServer]);

            const handleDeleteAll = async () => {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'okgarage-mini-app';

                setGarage([]);

            const handleOpenGallery = (car) => {

            const fetchGeminiLore = async (car, sectionName) => {
                if (!geminiKey) return;
                
                showNotification(`AI writing engine generating copy: ${sectionName}...`);
                const systemPrompt = "You are an elite, automotive copywriter for a high-end racing catalog. Write exactly one dynamic, context-aware paragraph describing the specified section of this car.";
                const prompt = `Write a deep mechanical, luxurious paragraph describing the ${sectionName} of the following car: Year ${car.year}, Brand ${car.brand}, Model ${car.modelName}, Trim ${car.trim}, Horsepower ${car.horsepower} HP, Top Speed ${car.topSpeed} mph, Cost $${car.cost}. Use standard phrasing. No lists, just clean automotive copy. Keep under 380 letters.`;

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const json = await res.json();
                    const text = json.candidates?.[0]?.content?.parts?.[0]?.text;

            const handleDownloadLocalBackup = () => {

            const handleImportLocalFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (Array.isArray(parsed)) {
                            showNotification("Converting schemas and compressing images...");
                            
                            // Safe decompression parsing
                            const sanitized = await Promise.all(parsed.map(async (car, idx) => {
                                let brand = car.brand || "";
                                let modelName = car.modelName || "";
                                if (!brand && !modelName && car.makeModel) {
                                    const words = car.makeModel.split(' ');
                                    brand = words[0] || "Concept";
                                    modelName = words.slice(1).join(' ') || "Machine";
                                }

                                let compressedImg = car.image || "";
                                if (compressedImg && compressedImg.startsWith("data:image")) {
                                    compressedImg = await compressBase64(compressedImg);
                                }

                                let compressedImages = [];
                                if (car.images && car.images.length > 0) {
                                    compressedImages = await Promise.all(car.images.map(async (img) => {
                                        if (img && img.startsWith("data:image")) {
                                            // Photo Album images should stay close to full
                                            // quality (this is where people zoom in on the
                                            // in-game shots), so use a much larger cap and
                                            // higher JPEG quality than the small card cover.
                                            return await compressBase64(img, 1920, 1440, 0.95);
                                        }
                                        return img;
                                    }));
                                }

                                return {
                                    ...car,
                                    brand,
                                    modelName,
                                    image: compressedImg,
                                    images: compressedImages,
                                    id: car.id || (Date.now() + idx)
                                };
                            }));

                            setGarage(sanitized);
                            showNotification("Local backup restored successfully.");
                        } else {
                            showNotification("Invalid file format.");
                        }
                    } catch (err) {
                        showNotification("Incorrect configuration file format.");
                    }
                };
                reader.readAsText(file);
            };

            const handleBulkImageUpload = async (e) => {

                showNotification("Compressing uploaded photos...");

                            const compressed = await compressBase64(reader.result, 1920, 1440, 0.95);

            // Renders the compact car card (year/model/level/trim/photo/HP/buy
            // price/tags) to a canvas and downloads it as a transparent-corner
            // PNG with the OK watermark, so it looks the same outside the site.
            const handleSaveCardImage = async (car) => {
                try {
                    showNotification("Rendering card image...");
                    const scale = 2; // draw at 2x for a crisp, full-quality export
                    const width = 480 * scale;
                    const height = 560 * scale;
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');

                    const spec = getDynamicGradient(car.color);
                    const [r, g, b] = spec.rawRGB.split(',').map(s => parseInt(s.trim(), 10));
                    const radius = 28 * scale;
                    const pad = 24 * scale;

                    // Clip everything to a rounded rect so the four corners of
                    // the PNG stay fully transparent instead of solid squares.
                    traceRoundedRectPath(ctx, 0, 0, width, height, radius);
                    ctx.save();
                    ctx.clip();

                    // Match the site's CSS radial-gradient exactly: it defaults to
                    // "farthest-corner" sizing, and its color stops sit at
                    // 0% / 22% / 55% / 85% (not 100%) before settling into the
                    // near-black background -- using 100% here was why the export
                    // looked flatter/lighter than the real card.
                    const outerRadius = Math.sqrt((width / 2) ** 2 + (height / 2) ** 2);
                    const bgGradient = ctx.createRadialGradient(width / 2, height / 2, 0, width / 2, height / 2, outerRadius);
                    bgGradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0.58)`);
                    bgGradient.addColorStop(0.22, `rgba(${r}, ${g}, ${b}, 0.30)`);
                    bgGradient.addColorStop(0.55, `rgba(${r}, ${g}, ${b}, 0.08)`);
                    bgGradient.addColorStop(0.85, `rgba(7, 8, 11, 1)`);
                    ctx.fillStyle = bgGradient;
                    ctx.fillRect(0, 0, width, height);

                    // Year / Model header row
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.font = `bold ${9 * scale}px sans-serif`;
                    ctx.fillText('YEAR', pad, pad + 10 * scale);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `bold ${14 * scale}px sans-serif`;
                    ctx.fillText(String(car.year || ''), pad, pad + 28 * scale);

                    const modelX = pad + 70 * scale;
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.font = `bold ${9 * scale}px sans-serif`;
                    ctx.fillText('MODEL', modelX, pad + 10 * scale);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `bold ${14 * scale}px sans-serif`;
                    const modelText = `${car.brand || ''} ${car.modelName || ''}`.trim();
                    let displayModel = modelText;
                    const maxModelWidth = width - modelX - 110 * scale;
                    while (ctx.measureText(displayModel).width > maxModelWidth && displayModel.length > 3) {
                        displayModel = displayModel.slice(0, -1);
                    }
                    if (displayModel !== modelText) displayModel = displayModel.trim() + '…';
                    ctx.fillText(displayModel, modelX, pad + 28 * scale);

                    // Level badge, right-aligned
                    const resolvedLevel = getCarLevel(car);
                    const badgeStyles = getLevelBadgeStyles(resolvedLevel);
                    const levelText = resolvedLevel === 'Level 0' ? '0' : resolvedLevel;
                    ctx.font = `bold ${9 * scale}px sans-serif`;
                    const levelLabelWidth = ctx.measureText('LEVEL').width;
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.fillText('LEVEL', width - pad - levelLabelWidth, pad + 10 * scale);

                    ctx.font = `bold ${10 * scale}px sans-serif`;
                    const levelTextWidth = ctx.measureText(levelText).width;
                    const badgePadX = 8 * scale;
                    const badgeWidth = levelTextWidth + badgePadX * 2;
                    const badgeHeight = 20 * scale;
                    const badgeX = width - pad - badgeWidth;
                    const badgeY = pad + 14 * scale;
                    traceRoundedRectPath(ctx, badgeX, badgeY, badgeWidth, badgeHeight, 5 * scale);
                    ctx.fillStyle = badgeStyles.bg;
                    ctx.fill();
                    ctx.strokeStyle = badgeStyles.border;
                    ctx.lineWidth = 1 * scale;
                    ctx.stroke();
                    ctx.fillStyle = badgeStyles.text;
                    ctx.textAlign = 'center';
                    ctx.fillText(levelText, badgeX + badgeWidth / 2, badgeY + badgeHeight / 2 + 4 * scale);
                    ctx.textAlign = 'left';

                    // Trim line
                    if (car.trim) {
                        ctx.fillStyle = 'rgba(255,255,255,0.6)';
                        ctx.font = `600 ${11 * scale}px sans-serif`;
                        ctx.fillText(`Trim: ${car.trim}`, pad, pad + 48 * scale);
                    }

                    // Car photo, centered
                    const imgBoxTop = pad + 72 * scale;
                    const imgBoxHeight = 220 * scale;
                    if (car.image) {
                        try {
                            const carImg = await loadImageEl(car.image);
                            const maxW = width - pad * 2;
                            const maxH = imgBoxHeight;
                            let dw = carImg.width, dh = carImg.height;
                            const ratio = Math.min(maxW / dw, maxH / dh);
                            dw *= ratio; dh *= ratio;
                            const dx = (width - dw) / 2;
                            const dy = imgBoxTop + (imgBoxHeight - dh) / 2;
                            ctx.drawImage(carImg, dx, dy, dw, dh);
                        } catch (e) {
                            console.warn("Failed loading car image for export:", e);
                        }
                    }

                    // Divider + HP / Buy Price row
                    const statsY = imgBoxTop + imgBoxHeight + 16 * scale;
                    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                    ctx.lineWidth = 1 * scale;
                    ctx.beginPath();
                    ctx.moveTo(pad, statsY);
                    ctx.lineTo(width - pad, statsY);
                    ctx.stroke();

                    const statsLabelY = statsY + 20 * scale;
                    const statsValueY = statsY + 40 * scale;
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.font = `bold ${10 * scale}px sans-serif`;
                    ctx.fillText('HP', pad, statsLabelY);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `bold ${14 * scale}px sans-serif`;
                    ctx.fillText(`${car.horsepower || 0} HP`, pad, statsValueY);

                    const buyLabelX = width / 2 + 10 * scale;
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.font = `bold ${10 * scale}px sans-serif`;
                    ctx.fillText('BUY PRICE', buyLabelX, statsLabelY);
                    ctx.fillStyle = '#30d158';
                    ctx.font = `bold ${14 * scale}px sans-serif`;
                    ctx.fillText(`$${Number(car.cost || 0).toLocaleString()}`, buyLabelX, statsValueY);

                    // Tags row
                    const tagsY = statsValueY + 22 * scale;
                    if (car.tags && car.tags.length > 0) {
                        let tagX = pad;
                        car.tags.forEach(tag => {
                            const tagStyles = getGreenvilleTagStyles(tag);
                            ctx.font = `bold ${10 * scale}px sans-serif`;
                            const tagTextWidth = ctx.measureText(tag).width;
                            const tagPadX = 10 * scale;
                            const tagW = tagTextWidth + tagPadX * 2;
                            const tagH = 22 * scale;
                            traceRoundedRectPath(ctx, tagX, tagsY, tagW, tagH, tagH / 2);
                            ctx.fillStyle = tagStyles.bg;
                            ctx.fill();
                            ctx.strokeStyle = tagStyles.border;
                            ctx.lineWidth = 1 * scale;
                            ctx.stroke();
                            ctx.fillStyle = tagStyles.text;
                            ctx.textAlign = 'center';
                            ctx.fillText(tag, tagX + tagW / 2, tagsY + tagH / 2 + 4 * scale);
                            ctx.textAlign = 'left';
                            tagX += tagW + 8 * scale;
                        });
                    } else {
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.font = `italic ${10 * scale}px sans-serif`;
                        ctx.fillText('No tags', pad, tagsY + 15 * scale);
                    }

                    ctx.restore(); // lift the rounded-rect clip before drawing the border/watermark

                    // Colored border ring matching the site's card border (same
                    // color as the background glow) -- this was missing entirely
                    // from the export before.
                    const borderWidth = 2 * scale;
                    traceRoundedRectPath(ctx, borderWidth / 2, borderWidth / 2, width - borderWidth, height - borderWidth, radius - borderWidth / 2);
                    ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, 0.55)`;
                    ctx.lineWidth = borderWidth;
                    ctx.stroke();

                    try {
                        const logo = await loadOkLogo();
                        drawOkWatermark(ctx, width, height, logo);
                    } catch (logoErr) {
                        console.warn("Could not load OK logo watermark:", logoErr);
                        showNotification("Card saved, but the watermark couldn't load (check your connection).");
                    }

                    const filename = `${sanitizeFileNamePart(car.year)}_${sanitizeFileNamePart(car.brand)}_${sanitizeFileNamePart(car.modelName)}_card.png`;
                    downloadCanvasAsPng(canvas, filename);
                    showNotification("Card image saved!");
                } catch (err) {
                    console.error("Failed to save card image:", err);
                    showNotification("Couldn't generate the card image. Please try again.");
                }
            };

            // Downloads a single Photo Album image at full resolution with the
            // OK watermark composited bottom-right.
            const handleSaveGalleryPhoto = async (imgSrc, car, idx) => {

                    const canvas = document.createElement('canvas');
                    canvas.width = photoImg.width;
                    canvas.height = photoImg.height;

                    try {

                    } catch (logoErr) {

                    }

                    const filename = `${sanitizeFileNamePart(car.year)}_${sanitizeFileNamePart(car.brand)}_${sanitizeFileNamePart(car.modelName)}_photo_${idx + 1}.png`;
                    downloadCanvasAsPng(canvas, filename);
                    showNotification("Photo saved!");
                } catch (err) {
                    console.error("Failed to save gallery photo:", err);
                    showNotification("Couldn't save that photo. Please try again.");
                }
            };

            const handleAddFrontCardPic = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (event) => {
                    const compressed = await compressBase64(event.target.result, 800, 600);

                reader.readAsDataURL(file);
            };

            const handleSamplePicClick = (e) => {
                if (!paletteCanvasRef.current) return;
                const canvas = paletteCanvasRef.current;
                const rect = e.target.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * canvas.width;
                const y = ((e.clientY - rect.top) / rect.height) * canvas.height;
                
                try {
                    const ctx = canvas.getContext('2d');
                    const pixel = ctx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;
                    const r = pixel[0];
                    const g = pixel[1];
                    const b = pixel[2];
                    
                    const componentToHex = (c) => {
                        const hex = c.toString(16);
                        return hex.length === 1 ? "0" + hex : hex;
                    };
                    const extractedHex = `#${componentToHex(r)}${componentToHex(g)}${componentToHex(b)}`;
                    
                    setCustomHex(extractedHex);
                    setCurrentCar(prev => ({ ...prev, color: extractedHex }));
                    showNotification(`Sampled paint color: ${extractedHex}`);
                } catch (err) {
                    console.error("Color sample error: ", err);
                }
            };

            const handleToggleLapTimer = () => {
                if (isLapRunning) {
                    clearInterval(lapTimerRef.current);
                    setIsLapRunning(false);
                    const finishTime = lapTime;
                    const prevBest = selectedGalleryCar.bestLap || 0;
                    if (prevBest === 0 || finishTime < prevBest) {
                        const updatedGarage = garage.map(c => {
                            if (c.id === selectedGalleryCar.id) {
                                const updatedCar = { ...c, bestLap: finishTime };
                                setSelectedGalleryCar(updatedCar);
                                return updatedCar;
                            }
                            return c;
                        });
                        setGarage(updatedGarage);
                        showNotification(`New Racetrack Personal Best! 🏁 ${formatLapTime(finishTime)}`);

                        setLapTime(Date.now() - startTime);

                    setIsLapRunning(true);

            const handleResetLapTimer = () => {
                clearInterval(lapTimerRef.current);
                setIsLapRunning(false);
                setLapTime(0);
            };

            const formatLapTime = (ms) => {
                const totalSec = Math.floor(ms / 1000);
                const min = Math.floor(totalSec / 60);
                const sec = totalSec % 60;
                const mils = Math.floor((ms % 1000) / 10);
                const pad = (n, s = 2) => ('00' + n).slice(-s);
                return `${pad(min)}:${pad(sec)}.${pad(mils)}`;
            };

            // Adaptive layout selectors
            const garageGridClass = useMemo(() => {
                if (splitOffset < 15) return 'grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5';

            const gridStyle = useMemo(() => {
                const leftColWidth = splitOffset < 5 ? '0px' : `${splitOffset}%`;
                const rightColWidth = splitOffset > 95 ? '0px' : '1fr';
                return { gridTemplateColumns: `${leftColWidth} 10px ${rightColWidth}` };
            }, [splitOffset]);

            const gallerySpec = selectedGalleryCar ? getDynamicGradient(selectedGalleryCar.color) : null;
            const galleryLevel = selectedGalleryCar ? getCarLevel(selectedGalleryCar) : null;
            const galleryBadgeStyles = selectedGalleryCar ? getLevelBadgeStyles(galleryLevel) : null;
            const galleryEstimatedSell = selectedGalleryCar ? calculateEstimatedSellPrice(selectedGalleryCar.cost, selectedGalleryCar.miles) : 0;

            return (
                <div className="w-full h-screen bg-[#07080b] text-white flex flex-col relative select-none overflow-hidden">
                    
                    {toast.visible && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[150] flex items-center gap-3 px-6 py-3 rounded-full bg-[#181a20]/95 border border-white/10 shadow-[0_12px_40px_rgba(0,0,0,0.85)] transition-all">
                            <div className="w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse" />
                            <span className="text-xs font-semibold text-white/90 tracking-wide">{toast.message}</span>
                        </div>

                                                <svg className="w-12 h-12 text-white/10 mb-2 select-none animate-pulse" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                                                    <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2" strokeLinecap="round" strokeLinejoin="round"/>
                                                    <circle cx="7" cy="17" r="2"/>
                                                    <path d="M9 17h6" strokeLinecap="round" strokeLinejoin="round"/>
                                                    <circle cx="17" cy="17" r="2"/>
                                                </svg>
                                                <p className="text-xs text-white/40 font-bold tracking-wider uppercase mb-1 font-sans">Album empty</p>
                                                <p className="text-[10px] text-white/30 max-w-[180px] leading-relaxed font-sans">Use the + Add Photos button to bulk import images.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                            </div>

                        </div>
                    )}

                    {/* CREATE OR EDIT FLEET MODAL POPUP */}
                    {addEditModalState.isRendered && currentCar && (
                        <div className={`fixed inset-0 z-[100] flex items-center justify-center p-4 transition-all duration-[300ms] ${addEditModalState.isVisible ? 'opacity-100' : 'opacity-0'}`}>
                            <div className="absolute inset-0 bg-black/85 backdrop-blur-md" onClick={handleCloseAddEdit}></div>
                            
                            <div className={`bg-[#121318] border border-white/10 w-full max-w-lg rounded-[28px] z-10 p-6 shadow-2xl relative transition-all duration-300 transform ${addEditModalState.isVisible ? 'scale-100 translate-y-0' : 'scale-95 translate-y-4'}`}>
                                <h3 className="text-sm font-black uppercase tracking-widest mb-6 font-['Montserrat'] bg-gradient-to-r from-white to-white/60 bg-clip-text text-transparent">
                                    {currentCar.id ? 'Edit Vehicle Properties' : 'Create New Fleet Vehicle'}
                                </h3>
                                
                                <form onSubmit={handleSaveCar} className="flex flex-col gap-4 overflow-y-auto max-h-[70vh] pr-1">
                                    
                                    <div className="flex flex-col gap-2">
                                        <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Vignette Paint Theme Selection</label>
                                        <div className="grid grid-cols-8 gap-2 mb-1">
                                            {palette.map((colorObj) => {
                                                const isSelected = currentCar.color?.toLowerCase() === colorObj.name.toLowerCase();
                                                return (
                                                    <button
                                                        type="button"
                                                        key={colorObj.name}
                                                        onClick={() => {
                                                            setCurrentCar({ ...currentCar, color: colorObj.name });
                                                            setCustomHex(colorObj.hex);
                                                        }}
                                                        style={{ backgroundColor: colorObj.hex }}
                                                        className={`aspect-square rounded-xl border flex items-center justify-center transition-all ${
                                                            isSelected ? 'border-white scale-110 shadow-[0_0_15px_rgba(255,255,255,0.4)]' : 'border-white/10 hover:scale-105'
                                                        }`}
                                                        title={colorObj.name}
                                                    >
                                                        {isSelected && <span className="text-[10px] text-white font-bold">✓</span>}
                                                    </button>
                                                );
                                            })}
                                            
                                            <div className="col-span-1 flex items-center justify-center relative">
                                                <input 
                                                    type="color" 
                                                    value={customHex}
                                                    onChange={e => {
                                                        const newHex = e.target.value;
                                                        setCustomHex(newHex);
                                                        setCurrentCar({ ...currentCar, color: newHex });
                                                    }}
                                                    className="absolute inset-0 opacity-0 cursor-pointer w-full h-full"
                                                />
                                                <div className="w-full h-full aspect-square rounded-xl border border-dashed border-white/30 flex items-center justify-center text-[10px] text-white/60 hover:border-white/50 transition-colors font-sans">
                                                    Hex
                                                </div>
                                            </div>
                                        </div>

                                        <div className="flex items-center gap-3 bg-white/[0.02] border border-white/5 p-3 rounded-2xl my-1">
                                            <div 
                                                className="w-12 h-12 rounded-xl border border-white/10 flex-shrink-0" 
                                                style={{ background: getDynamicGradient(currentCar.color).gradient }}
                                            />
                                            <div>
                                                <span className="text-[10px] text-white/40 uppercase font-black block font-sans">Active Vignette Theme</span>
                                                <span className="text-xs font-semibold text-white/80 font-sans">{currentCar.color || 'No theme selected'}</span>
                                            </div>
                                        </div>

                                        {/* Picture canvas sampling interface */}
                                        <div className="flex flex-col gap-1.5 mt-2 bg-white/[0.01] border border-white/5 p-3 rounded-2xl">
                                            <div className="flex justify-between items-center">
                                                <span className="text-[9px] text-emerald-400 font-black uppercase tracking-widest font-sans">Sample Color From Front Pic</span>
                                                <label className="px-3 py-1.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-[10px] font-bold cursor-pointer transition-colors text-center font-sans">
                                                    Upload Pic
                                                    <input type="file" accept="image/*" onChange={handleAddFrontCardPic} className="hidden" />
                                                </label>
                                            </div>
                                            {sampledPicData && (
                                                <div className="relative mt-2 rounded-xl overflow-hidden border border-white/10 flex flex-col items-center">
                                                    <p className="text-[8px] text-white/40 font-bold mb-1 font-sans">CLICK ON THE IMAGE BELOW TO EXTRACT THE PAINT COLOR:</p>
                                                    <img 
                                                        src={sampledPicData} 
                                                        alt="sampler preview" 
                                                        onClick={handleSamplePicClick} 
                                                        className="max-h-40 object-contain w-full cursor-crosshair hover:opacity-90 transition-opacity"
                                                    />
                                                    <canvas ref={paletteCanvasRef} className="hidden" />
                                                </div>
                                            )}
                                        </div>

                                        <div className="flex flex-col gap-1">
                                            <input 
                                                type="text" 
                                                value={currentCar.color} 
                                                onChange={e => setCurrentCar({ ...currentCar, color: e.target.value })}
                                                className="w-full bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20 font-sans"
                                                placeholder="Type color name..."
                                            />
                                            <div className="flex justify-end mt-1">
                                                <button
                                                    type="button"
                                                    onClick={() => {
                                                        const name = currentCar.color ? currentCar.color.trim() : "";
                                                        if (!name) {
                                                            showNotification("Please specify a name for this color theme!");
                                                            return;
                                                        }
                                                        if (palette.some(p => p.name.toLowerCase() === name.toLowerCase())) {
                                                            showNotification("A theme with this name already exists.");
                                                            return;
                                                        }
                                                        const newPalette = [...palette, { name, hex: customHex }];
                                                        setPalette(newPalette);
                                                        try {
                                                            localStorage.setItem('okgarage_color_palette', JSON.stringify(newPalette));
                                                        } catch (e) {}
                                                        showNotification(`Registered "${name}" into vignette themes!`);
                                                    }}
                                                    className="px-4 py-1.5 rounded-xl bg-emerald-500/20 hover:bg-emerald-500/30 border border-emerald-500/30 text-emerald-400 text-[10px] font-black transition-all font-sans uppercase tracking-wider"
                                                >
                                                    + Register Swatch Theme
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-2">
                                        <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Toggle Greenville Tags</label>
                                        <div className="grid grid-cols-4 gap-2">
                                            {["Limited", "Off-Sale", "Collectible", "Event"].map(tag => {
                                                const isActive = currentCar.tags?.includes(tag);
                                                const tagStyles = getGreenvilleTagStyles(tag);
                                                
                                                return (
                                                    <button
                                                        type="button"
                                                        key={tag}
                                                        onClick={() => {
                                                            const activeTags = currentCar.tags || [];
                                                            const nextTags = isActive 
                                                                ? activeTags.filter(t => t !== tag)
                                                                : [...activeTags, tag];
                                                            setCurrentCar({ ...currentCar, tags: nextTags });
                                                        }}
                                                        style={{
                                                            backgroundColor: isActive ? tagStyles.bg : 'rgba(255,255,255,0.02)',
                                                            color: isActive ? tagStyles.text : 'rgba(255,255,255,0.3)',
                                                            borderColor: isActive ? tagStyles.text : 'rgba(255,255,255,0.06)',
                                                            boxShadow: isActive ? `0 0 14px ${tagStyles.text}35` : 'none'
                                                        }}
                                                        className="py-2 rounded-xl text-[10px] font-black tracking-wider uppercase border text-center transition-all duration-300 font-sans"
                                                    >
                                                        {tag}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Brand (Make)</label>
                                            <input required placeholder="e.g. Western" value={currentCar.brand || ""} onChange={e => setCurrentCar({ ...currentCar, brand: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20 font-sans" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Model Name</label>
                                            <input required placeholder="e.g. Protobunny" value={currentCar.modelName || ""} onChange={e => setCurrentCar({ ...currentCar, modelName: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20 font-sans" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Trim Configuration</label>
                                            <input placeholder="e.g. XRh" value={currentCar.trim || ""} onChange={e => setCurrentCar({ ...currentCar, trim: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20 font-sans" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Year</label>
                                            <input placeholder="e.g. 2026" value={currentCar.year || ""} onChange={e => setCurrentCar({ ...currentCar, year: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20 font-sans" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Odometer Miles</label>
                                            <input type="number" step="any" placeholder="0" value={currentCar.miles} onChange={e => setCurrentCar({ ...currentCar, miles: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20 font-sans" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Purchase Cost ($)</label>
                                            <input type="number" placeholder="45000" value={currentCar.cost} onChange={e => setCurrentCar({ ...currentCar, cost: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20 font-sans" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Horsepower (HP)</label>
                                            <input type="number" placeholder="450" value={currentCar.horsepower} onChange={e => setCurrentCar({ ...currentCar, horsepower: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20 font-sans" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] text-white/40 uppercase font-black pl-1 font-sans">Top Speed (mph)</label>
                                            <input type="number" placeholder="180" value={currentCar.topSpeed} onChange={e => setCurrentCar({ ...currentCar, topSpeed: e.target.value })} className="bg-black/40 border border-white/[0.06] rounded-xl px-4 py-2.5 text-xs text-white focus:outline-none focus:border-white/20 font-sans" />
                                        </div>
                                    </div>

                                    <div className="flex gap-2 mt-6 pt-4 border-t border-white/[0.04]">
                                        <button type="button" onClick={handleCloseAddEdit} className="flex-1 py-3 bg-white/5 hover:bg-white/10 rounded-xl text-xs font-black uppercase tracking-wider font-sans">Cancel</button>
                                        <button type="submit" className="flex-1 py-3 bg-emerald-500 hover:bg-emerald-600 text-black rounded-xl text-xs font-black uppercase tracking-wider font-sans">Save Properties</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {!galleryModalState.isRendered && !addEditModalState.isRendered && (
                        <div id="sync-settings" className="fixed bottom-6 left-6 z-[130]">
                            <button 
                                onClick={() => {
                                    const key = prompt("Enter Gemini API Key (leaves secure local session):", geminiKey);
                                    if (key !== null) {
                                        setGeminiKey(key.trim());
                                        showNotification(key.trim() ? "Gemini Engine initialized! Click ✨ Ask Gemini in Photo Album to generate lore." : "Key cleared. Using failsafe generator.");
                                    }
                                }}
                                className="h-9 px-4 rounded-xl bg-[#ffffff]/[0.05] backdrop-blur-xl border border-white/[0.06] text-[11px] font-medium text-white/70 hover:text-white hover:bg-white/10 flex items-center gap-2 transition-all font-sans"
                            >
                                <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                                    <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3M15.5 7.5L19 4" />
                                </svg>
                                <span>{geminiKey ? "Gemini: Active" : "Setup Gemini"}</span>
                            </button>
                        </div>
                    )}

                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
